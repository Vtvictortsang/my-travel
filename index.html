<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊足跡 - 地圖雲端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入 Leaflet 地圖樣式與腳本 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        #map {
            height: 350px;
            width: 100%;
            z-index: 5;
            background-color: #f1f5f9;
        }
        #displayImage {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #6366f1;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem;
            background: #334155; color: white; border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 100; display: none; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <div id="toast" class="toast">訊息內容</div>

    <!-- 左側欄 -->
    <aside class="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col h-1/3 md:h-full z-10 shadow-lg md:shadow-none">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-indigo-600 text-white">
            <h1 class="text-xl font-bold tracking-tight"><i class="fa-solid fa-earth-asia mr-2"></i>旅遊足跡</h1>
            <button id="addBtn" onclick="addNewLocation()" class="hover:bg-indigo-500 p-2 rounded-full transition-colors" title="新增地點">
                <i class="fa-solid fa-plus text-lg"></i>
            </button>
        </div>
        <div id="locationList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
            <div class="flex items-center justify-center p-10 text-slate-400">
                <div class="loading-spinner mr-3"></div>連線中...
            </div>
        </div>
    </aside>

    <!-- 右側欄 -->
    <main class="flex-1 h-2/3 md:h-full overflow-y-auto bg-slate-50 relative custom-scrollbar">
        <div id="mapContainer" class="sticky top-0 z-20 bg-white border-b border-slate-200 shadow-sm">
            <div id="map"></div>
            <div id="mapOverlay" class="absolute inset-0 bg-slate-900/10 pointer-events-none flex items-start justify-center pt-2">
                <span class="bg-white/90 px-3 py-1 rounded-full text-xs font-bold text-slate-600 shadow-sm">
                    <i class="fa-solid fa-location-dot text-red-500 mr-1"></i> 編輯時點擊地圖可更新座標
                </span>
            </div>
        </div>

        <div id="emptyState" class="flex flex-col items-center justify-center text-slate-400 p-20 text-center">
            <i class="fa-solid fa-map-location-dot text-6xl mb-4 opacity-20"></i>
            <p class="text-xl">點擊地標或列表開啟回憶</p>
        </div>

        <div id="contentView" class="hidden max-w-5xl mx-auto p-4 md:p-8">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-white">
                    <h2 id="displayTitle" class="text-2xl font-bold text-slate-800 truncate mr-4 text-wrap">地點名稱</h2>
                    <div class="flex space-x-2 flex-shrink-0">
                        <button onclick="toggleEditMode()" class="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-all" title="編輯">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button onclick="deleteCurrentLocation()" class="p-2 bg-red-50 hover:bg-red-100 text-red-500 rounded-lg transition-all" title="刪除">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>

                <div id="displayImageContainer" class="w-full bg-slate-50 border-b border-slate-50 flex items-center justify-center overflow-hidden">
                    <img id="displayImage" src="" alt="地點圖片" class="hidden shadow-sm">
                </div>

                <div class="p-6">
                    <div id="displayDescription" class="text-slate-600 leading-relaxed whitespace-pre-wrap text-lg min-h-[100px]"></div>

                    <div id="editForm" class="hidden space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">地點名稱</label>
                                <div class="relative">
                                    <input type="text" id="editTitleInput" class="w-full p-3 pr-10 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                                    <button onclick="searchLocation()" class="absolute right-2 top-2 p-1.5 text-indigo-600 hover:bg-indigo-50 rounded-lg" title="自動尋找座標">
                                        <i class="fa-solid fa-magnifying-glass-location"></i>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">圖片網址</label>
                                <input type="text" id="editImageInput" placeholder="https://..." class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                        <div class="p-3 bg-indigo-50 rounded-xl text-xs text-indigo-700 flex items-center justify-between">
                            <span><i class="fa-solid fa-circle-info mr-2"></i> 提示：輸入名稱後按右側放大鏡自動定位，或點擊地圖選取。</span>
                            <span id="coordDisplay" class="font-mono font-bold opacity-70"></span>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">內容分享</label>
                            <textarea id="editDescInput" rows="6" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                        </div>
                        <div class="flex space-x-3 pt-4">
                            <button id="saveBtn" onclick="saveChanges()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition-all shadow-md">儲存修改</button>
                            <button onclick="toggleEditMode()" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium rounded-xl transition-all">取消</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="h-20"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFBhaRtjzBcav9dI7TfNt0E2ZjjUW1b28",
            authDomain: "mytraveljournal-74571.firebaseapp.com",
            projectId: "mytraveljournal-74571",
            storageBucket: "mytraveljournal-74571.firebasestorage.app",
            messagingSenderId: "1056167338813",
            appId: "1:1056167338813:web:8dd15d6d1dae9e8efb5b54",
            measurementId: "G-SWKJ3RBM15"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'mytraveljournal-74571';

        let locations = [];
        let currentId = null;
        let map, markersLayer, tempMarker;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function initMap() {
            map = L.map('map', {
                center: [22.3193, 114.1694], // 預設初始化在香港附近
                zoom: 3,
                zoomControl: true
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            markersLayer = L.layerGroup().addTo(map);

            map.on('click', (e) => {
                const isEditing = !document.getElementById('editForm').classList.contains('hidden');
                if (isEditing) {
                    const { lat, lng } = e.latlng;
                    updateTempMarker(lat, lng);
                }
            });
        }

        function updateTempMarker(lat, lng) {
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker([lat, lng], {
                icon: L.divIcon({
                    html: '<i class="fa-solid fa-location-crosshairs text-indigo-600 text-2xl animate-pulse"></i>',
                    className: 'custom-div-icon',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                })
            }).addTo(map);
            document.getElementById('coordDisplay').innerText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            showToast("已在地圖標記位置");
        }

        // 新增功能：搜尋地點座標
        window.searchLocation = async function() {
            const query = document.getElementById('editTitleInput').value;
            if (!query) return showToast("請先輸入地點名稱");
            
            showToast("正在搜尋...");
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (data && data.length > 0) {
                    const { lat, lon } = data[0];
                    const latNum = parseFloat(lat);
                    const lngNum = parseFloat(lon);
                    updateTempMarker(latNum, lngNum);
                    map.flyTo([latNum, lngNum], 12);
                    showToast(`找到地點：${data[0].display_name.split(',')[0]}`);
                } else {
                    showToast("找不到該地點，請手動點擊地圖");
                }
            } catch (e) {
                showToast("搜尋服務暫時不可用");
            }
        };

        const initAuth = async () => {
            try { await signInAnonymously(auth); } catch (e) { showToast("Firebase 連線失敗"); }
        };

        initMap();
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
                onSnapshot(collectionRef, (snapshot) => {
                    locations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    locations.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    renderList();
                    updateMapMarkers();
                });
            }
        });

        function updateMapMarkers() {
            markersLayer.clearLayers();
            locations.forEach(loc => {
                if (loc.lat && loc.lng) {
                    const marker = L.marker([loc.lat, loc.lng], {
                        icon: L.divIcon({
                            html: `<i class="fa-solid fa-location-dot ${currentId === loc.id ? 'text-indigo-600 scale-125' : 'text-red-500'} text-2xl drop-shadow-md transition-all"></i>`,
                            className: 'custom-div-icon',
                            iconSize: [24, 24],
                            iconAnchor: [12, 24]
                        })
                    });
                    marker.bindPopup(`<b>${loc.title}</b>`).on('click', () => selectLocation(loc.id));
                    markersLayer.addLayer(marker);
                }
            });
        }

        window.renderList = function() {
            const listElement = document.getElementById('locationList');
            listElement.innerHTML = '';
            if (locations.length === 0) {
                listElement.innerHTML = `<div class="p-10 text-center text-slate-400 text-sm italic">點擊 + 開始新增</div>`;
                return;
            }
            locations.forEach(loc => {
                const item = document.createElement('div');
                const isActive = currentId === loc.id;
                item.className = `p-4 mb-1 cursor-pointer rounded-xl flex items-center space-x-3 transition-all ${isActive ? 'bg-indigo-50 border-l-4 border-indigo-500' : 'hover:bg-slate-50'}`;
                item.onclick = () => selectLocation(loc.id);
                item.innerHTML = `<span class="font-medium truncate flex-1 text-sm">${loc.title || "未命名"}</span>`;
                listElement.appendChild(item);
            });
        };

        window.selectLocation = function(id) {
            currentId = id;
            const loc = locations.find(l => l.id === id);
            if (!loc) return;
            if (loc.lat && loc.lng) map.flyTo([loc.lat, loc.lng], 10);
            updateUI(loc);
            renderList();
            updateMapMarkers();
        };

        function updateUI(loc) {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('contentView').classList.remove('hidden');
            document.getElementById('editForm').classList.add('hidden');
            document.getElementById('displayDescription').classList.remove('hidden');
            document.getElementById('displayTitle').innerText = loc.title || "未命名地點";
            document.getElementById('displayDescription').innerText = loc.description || "尚未填寫內容...";
            document.getElementById('coordDisplay').innerText = "";
            
            const img = document.getElementById('displayImage');
            if (loc.image && loc.image.trim() !== "") {
                img.src = loc.image;
                img.classList.remove('hidden');
            } else {
                img.classList.add('hidden');
            }
            if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
        }

        window.addNewLocation = async function() {
            try {
                const center = map.getCenter();
                const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'locations'), {
                    title: "新地點",
                    image: "",
                    description: "",
                    lat: center.lat,
                    lng: center.lng,
                    createdAt: serverTimestamp()
                });
                currentId = docRef.id;
                toggleEditMode();
            } catch (e) { showToast("新增失敗"); }
        };

        window.toggleEditMode = function() {
            const form = document.getElementById('editForm');
            const desc = document.getElementById('displayDescription');
            const loc = locations.find(l => l.id === currentId);
            if (!loc) return;

            if (form.classList.contains('hidden')) {
                document.getElementById('editTitleInput').value = loc.title || "";
                document.getElementById('editImageInput').value = loc.image || "";
                document.getElementById('editDescInput').value = loc.description || "";
                form.classList.remove('hidden');
                desc.classList.add('hidden');
                if (loc.lat) {
                    updateTempMarker(loc.lat, loc.lng);
                    document.getElementById('coordDisplay').innerText = `${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)}`;
                }
            } else {
                form.classList.add('hidden');
                desc.classList.remove('hidden');
                if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
            }
        };

        window.saveChanges = async function() {
            if (!currentId) return;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            
            const updateData = {
                title: document.getElementById('editTitleInput').value,
                image: document.getElementById('editImageInput').value,
                description: document.getElementById('editDescInput').value
            };

            if (tempMarker) {
                const pos = tempMarker.getLatLng();
                updateData.lat = pos.lat;
                updateData.lng = pos.lng;
            }

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId), updateData, { merge: true });
                showToast("雲端儲存成功");
                toggleEditMode();
            } catch (e) { showToast("儲存失敗"); } finally { saveBtn.disabled = false; }
        };

        window.deleteCurrentLocation = async function() {
            if (!currentId || !confirm("確定要刪除這筆旅遊紀錄嗎？")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId));
                currentId = null;
                document.getElementById('contentView').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                showToast("已刪除紀錄");
            } catch (e) { showToast("刪除失敗"); }
        };
    </script>
</body>
</html>
