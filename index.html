<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>足跡管理者中心 - 響應式視角</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        :root { --vh: 1vh; }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; padding: 0; overflow: hidden;
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
        }

        /* --- 基礎佈局架構 --- */
        #app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }

        /* 手機版：垂直 4 層 (預設) */
        .layer-1 { height: 10%; background: #1e293b; display: flex; align-items: center; padding: 0 1rem; z-index: 50; }
        .layer-2 { height: 20%; position: relative; background: #000; }
        .layer-3 { height: 20%; background: #ffffff; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .layer-4 { height: 50%; background: #ffffff; overflow-y: auto; position: relative; }

        /* 網頁版：橫向左右分欄 (螢幕寬度 > 1024px) */
        @media (min-width: 1024px) {
            #app-container { flex-direction: row; }
            /* 左側欄：控制、地圖與列表 (佔 40%) */
            .sidebar-admin { width: 40%; height: 100%; display: flex; flex-direction: column; border-right: 1px solid #e2e8f0; }
            /* 右側欄：主內容 (佔 60%) */
            .main-content-view { width: 60%; height: 100%; overflow-y: auto; background: #fff; }
            
            /* 調整網頁版層級高度 */
            .sidebar-admin .layer-1 { height: 80px; }
            .sidebar-admin .layer-2 { flex: 1; height: auto; } /* 地圖撐開 */
            .sidebar-admin .layer-3 { height: 250px; border-bottom: none; border-top: 1px solid #e2e8f0; }
            
            .layer-4 { height: 100% !important; width: 100%; }
        }

        #map { height: 100%; width: 100%; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 1rem 2rem; background: rgba(15, 23, 42, 0.95); color: white;
            border-radius: 16px; z-index: 9999; display: none; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .auth-modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
            display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(10px);
        }

        .nav-active { background-color: #6366f1 !important; color: white !important; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        
        .media-scroller { display: flex; gap: 16px; overflow-x: auto; padding: 10px 0; scroll-snap-type: x mandatory; }
        .media-card { flex: 0 0 85%; scroll-snap-align: start; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; background: #f1f5f9; }
        @media (min-width: 1024px) { .media-card { flex: 0 0 60%; } } /* 網頁版卡片小一點 */
        
        .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; }

        .loc-item { flex: 0 0 auto; width: 100px; text-align: center; margin-right: 12px; cursor: pointer; }
        .loc-thumb { width: 64px; height: 64px; margin: 0 auto; border-radius: 20px; object-fit: cover; border: 3px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .loc-active .loc-thumb { border-color: #6366f1; transform: translateY(-5px); }
        
        .privacy-badge { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
        .badge-public { background: #10b981; color: white; }
        .badge-private { background: #6366f1; color: white; }
    </style>
</head>
<body>

    <div id="toast" class="toast">訊息內容</div>

    <!-- 驗證彈窗 -->
    <div id="authModal" class="auth-modal">
        <div class="w-[90%] max-w-sm bg-white rounded-[2.5rem] p-10 text-center shadow-2xl">
            <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl">
                <i class="fa-solid fa-shield-heart"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">管理者登入</h2>
            <p class="text-slate-400 text-sm mb-8">驗證身份以編輯您的足跡</p>
            <button onclick="loginWithGoogle()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold active:scale-95 transition-all flex items-center justify-center gap-3">
                <i class="fa-brands fa-google"></i> Google 登入
            </button>
            <button onclick="closeAuthModal()" class="mt-6 text-slate-400 text-xs font-bold hover:text-slate-600 transition-colors">暫不登入，僅瀏覽</button>
        </div>
    </div>

    <div id="app-container">
        <!-- 手機版前三層 / 網頁版左側欄 -->
        <div class="sidebar-admin">
            <!-- 第 1 層：控制 (1/10) -->
            <header class="layer-1">
                <div class="flex items-center justify-between w-full">
                    <div id="userProfile" class="flex items-center gap-3 cursor-pointer group">
                        <div class="w-10 h-10 rounded-2xl bg-slate-700 flex items-center justify-center text-white overflow-hidden ring-2 ring-slate-700 ring-offset-2 ring-offset-slate-800 transition-all group-hover:scale-105">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="flex flex-col">
                            <h1 class="text-white font-black text-sm tracking-tight">足跡管理者</h1>
                            <span id="modeStatus" class="text-[10px] text-slate-400 font-bold opacity-80">公開展區模式</span>
                        </div>
                    </div>
                    <button id="addBtn" onclick="addNewLocation()" class="hidden w-11 h-11 bg-indigo-600 text-white rounded-2xl items-center justify-center shadow-xl shadow-indigo-900/40 active:scale-90 transition-transform">
                        <i class="fa-solid fa-plus text-lg"></i>
                    </button>
                </div>
            </header>

            <!-- 第 2 層：地圖 (2/10) -->
            <section class="layer-2">
                <div id="map"></div>
            </section>

            <!-- 第 3 層：模式切換與列表 (2/10) -->
            <section class="layer-3">
                <div class="p-3 flex gap-3 shrink-0">
                    <button onclick="switchViewMode('public')" id="btnPublic" class="flex-1 py-3 rounded-xl text-[12px] font-black transition-all nav-active">公開展區</button>
                    <button onclick="switchViewMode('private')" id="btnPrivate" class="hidden flex-1 py-3 rounded-xl text-[12px] font-black text-slate-400 bg-slate-50 border border-slate-100 transition-all">我的管理</button>
                </div>
                <div id="locationScroller" class="flex-1 overflow-x-auto flex items-center px-4 custom-scrollbar pb-2">
                    <!-- 地點列表自定義渲染 -->
                </div>
            </section>
        </div>

        <!-- 第 4 層：內容 (5/10) / 網頁版右側欄 -->
        <div class="main-content-view layer-4 custom-scrollbar">
            <div id="emptyContent" class="h-full flex flex-col items-center justify-center text-slate-300 p-12 text-center">
                <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-6">
                    <i class="fa-solid fa-paper-plane text-4xl opacity-20"></i>
                </div>
                <h3 class="text-slate-400 font-bold text-lg">準備好出發了嗎？</h3>
                <p class="text-slate-300 text-sm mt-2">請從左側列表選擇一個足跡</p>
            </div>

            <div id="mainContent" class="hidden animate-in fade-in duration-500">
                <div class="p-8 md:p-12 space-y-8 max-w-4xl mx-auto">
                    <!-- 標題 -->
                    <div class="flex justify-between items-start border-b border-slate-100 pb-8">
                        <div class="space-y-3">
                            <div class="flex items-center gap-3">
                                <span id="cDate" class="text-indigo-600 font-black text-xs tracking-widest bg-indigo-50 px-3 py-1 rounded-full"></span>
                                <span id="cBadge" class="privacy-badge"></span>
                            </div>
                            <h2 id="cTitle" class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight"></h2>
                        </div>
                        <div id="adminTools" class="hidden flex gap-3">
                            <button onclick="toggleEditMode()" class="w-12 h-12 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center hover:bg-slate-200 transition-colors"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="quickToggleVisibility()" id="cVisibilityBtn" class="w-12 h-12 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center hover:bg-slate-200 transition-colors"><i class="fa-solid fa-eye-slash"></i></button>
                        </div>
                    </div>

                    <!-- 媒體 -->
                    <div id="cMedia" class="media-scroller"></div>

                    <!-- 故事 -->
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-black text-slate-400 uppercase tracking-widest">The Story</span>
                            <div class="flex-1 h-[1px] bg-slate-100"></div>
                        </div>
                        <p id="cDesc" class="text-slate-600 text-lg leading-loose font-light whitespace-pre-wrap"></p>
                    </div>
                </div>
            </div>

            <!-- 編輯模式 -->
            <div id="editMode" class="hidden p-8 md:p-12 space-y-8 bg-slate-50 min-h-full">
                <div class="max-w-2xl mx-auto space-y-8">
                    <div class="flex items-center justify-between">
                        <h3 class="text-2xl font-black text-slate-900">編輯足跡內容</h3>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <span class="text-xs font-bold text-slate-500">設為公開</span>
                            <input type="checkbox" id="ePublic" class="w-6 h-6 rounded-lg accent-indigo-600">
                        </label>
                    </div>
                    
                    <div class="space-y-6">
                        <div class="group">
                            <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">地點名稱</label>
                            <input type="text" id="eTitle" class="w-full p-5 rounded-2xl border-2 border-transparent bg-white shadow-sm focus:border-indigo-500 outline-none transition-all font-bold text-lg" placeholder="去過哪裡呢？">
                        </div>
                        <div class="group">
                            <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">旅程日期</label>
                            <input type="date" id="eDate" class="w-full p-5 rounded-2xl border-2 border-transparent bg-white shadow-sm focus:border-indigo-500 outline-none transition-all font-bold">
                        </div>
                        <div class="group">
                            <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">心得故事</label>
                            <textarea id="eDesc" rows="8" class="w-full p-5 rounded-2xl border-2 border-transparent bg-white shadow-sm focus:border-indigo-500 outline-none transition-all text-base leading-relaxed" placeholder="記錄當下的感受..."></textarea>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <label class="text-[10px] font-black text-slate-400 uppercase block">相簿與影片 (網址)</label>
                        <div id="eMediaList" class="space-y-3"></div>
                        <button onclick="addMediaField()" class="w-full py-5 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-sm font-bold hover:border-indigo-300 hover:text-indigo-400 transition-all bg-white/50">+ 新增多媒體連結</button>
                    </div>

                    <div class="flex gap-4 pt-6">
                        <button onclick="saveChanges()" class="flex-[2] py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-2xl shadow-indigo-200 hover:bg-indigo-700 transition-all">確認儲存</button>
                        <button onclick="toggleEditMode()" class="flex-1 py-5 bg-white text-slate-400 font-bold rounded-2xl border border-slate-200 hover:bg-slate-50 transition-all">取消</button>
                    </div>
                    
                    <button onclick="deleteLoc()" class="w-full py-4 text-rose-400 font-bold text-xs uppercase tracking-[0.3em] hover:text-rose-600 transition-colors">刪除此足跡數據</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFBhaRtjzBcav9dI7TfNt0E2ZjjUW1b28",
            authDomain: "mytraveljournal-74571.firebaseapp.com",
            projectId: "mytraveljournal-74571",
            storageBucket: "mytraveljournal-74571.firebasestorage.app",
            messagingSenderId: "1056167338813",
            appId: "1:1056167338813:web:8dd15d6d1dae9e8efb5b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'mytraveljournal-74571';
        const googleProvider = new GoogleAuthProvider();

        let locations = [];
        let currentId = null;
        let map, markersLayer;
        let viewMode = 'public';
        let unsub = null;

        const setVh = () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setVh);
        setVh();

        function initMap() {
            map = L.map('map', { center: [23.6, 121], zoom: 7, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }

        onAuthStateChanged(auth, (user) => {
            const profile = document.getElementById('userProfile');
            const addBtn = document.getElementById('addBtn');
            const btnPriv = document.getElementById('btnPrivate');

            if (user) {
                profile.querySelector('div').innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                profile.onclick = () => { if(confirm("確定要登出管理員嗎？")) signOut(auth); };
                addBtn.style.display = 'flex';
                btnPriv.classList.remove('hidden');
                switchViewMode('private');
            } else {
                profile.querySelector('div').innerHTML = `<i class="fa-solid fa-user"></i>`;
                profile.onclick = openAuthModal;
                addBtn.style.display = 'none';
                btnPriv.classList.add('hidden');
                switchViewMode('public');
            }
        });

        window.switchViewMode = (mode) => {
            viewMode = mode;
            const isPub = mode === 'public';
            document.getElementById('btnPublic').className = isPub ? 'flex-1 py-3 rounded-xl text-[12px] font-black transition-all nav-active' : 'flex-1 py-3 rounded-xl text-[12px] font-black text-slate-400 bg-slate-50 border border-slate-100';
            document.getElementById('btnPrivate').className = !isPub ? 'flex-1 py-3 rounded-xl text-[12px] font-black transition-all nav-active' : 'flex-1 py-3 rounded-xl text-[12px] font-black text-slate-400 bg-slate-50 border border-slate-100';
            document.getElementById('modeStatus').innerText = isPub ? '公開展區模式' : '管理者模式';
            document.getElementById('addBtn').style.display = (!isPub && auth.currentUser) ? 'flex' : 'none';
            resetDetail(); loadData();
        };

        async function loadData() {
            if (unsub) unsub();
            let ref = (viewMode === 'public') ? 
                collection(db, 'artifacts', appId, 'public', 'data', 'locations') : 
                collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations');

            unsub = onSnapshot(ref, (snap) => {
                locations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (viewMode === 'public') locations = locations.filter(l => l.isPublic === true);
                locations.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
                renderList(); updateMarkers();
            }, (err) => console.error(err));
        }

        function renderList() {
            const container = document.getElementById('locationScroller');
            container.innerHTML = '';
            locations.forEach(loc => {
                const div = document.createElement('div');
                div.className = `loc-item ${currentId === loc.id ? 'loc-active' : ''}`;
                const thumb = (loc.media && loc.media[0]) ? convertUrl(loc.media[0].url) : 'https://ui-avatars.com/api/?name=Trip&background=random';
                div.innerHTML = `<img src="${thumb}" class="loc-thumb shadow-md"><p class="text-[10px] font-bold mt-2 text-slate-600 truncate px-1">${loc.title}</p>`;
                div.onclick = () => selectLoc(loc.id);
                container.appendChild(div);
            });
        }

        window.selectLoc = (id) => {
            currentId = id;
            const loc = locations.find(l => l.id === id);
            if (!loc) return;

            document.getElementById('emptyContent').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('editMode').classList.add('hidden');

            const isAdmin = auth.currentUser && (loc.userId === auth.currentUser.uid || viewMode === 'private');
            document.getElementById('adminTools').style.display = isAdmin ? 'flex' : 'none';

            document.getElementById('cTitle').innerText = loc.title;
            document.getElementById('cDate').innerText = loc.date || "未設定日期";
            document.getElementById('cDesc').innerText = loc.description || "這裡還沒有故事...";
            document.getElementById('cVisibilityBtn').innerHTML = loc.isPublic ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye text-emerald-500"></i>';

            const badge = document.getElementById('cBadge');
            badge.innerText = loc.isPublic ? "Public" : "Private";
            badge.className = `privacy-badge ${loc.isPublic ? 'badge-public' : 'badge-private'}`;

            const mediaBox = document.getElementById('cMedia');
            mediaBox.innerHTML = '';
            (loc.media || []).forEach(m => {
                const card = document.createElement('div'); card.className = 'media-card shadow-2xl';
                const url = convertUrl(m.url);
                card.innerHTML = m.type === 'image' ? `<img src="${url}">` : `<video src="${url}" controls></video>`;
                mediaBox.appendChild(card);
            });

            map.flyTo([loc.lat, loc.lng], 13);
            renderList(); updateMarkers();
        }

        window.quickToggleVisibility = async () => {
            const loc = locations.find(l => l.id === currentId);
            const newState = !loc.isPublic;
            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId), { isPublic: newState }, { merge: true });
            
            const pubRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId);
            if (newState) {
                await setDoc(pubRef, { ...loc, isPublic: true, updatedAt: serverTimestamp() });
            } else {
                await deleteDoc(pubRef).catch(() => {});
            }
            showToast(newState ? "已公開展示" : "已轉為私密");
        };

        window.toggleEditMode = () => {
            const main = document.getElementById('mainContent');
            const edit = document.getElementById('editMode');
            if (edit.classList.contains('hidden')) {
                const loc = locations.find(l => l.id === currentId);
                main.classList.add('hidden'); edit.classList.remove('hidden');
                document.getElementById('eTitle').value = loc.title;
                document.getElementById('eDate').value = loc.date || "";
                document.getElementById('eDesc').value = loc.description || "";
                document.getElementById('ePublic').checked = !!loc.isPublic;
                const list = document.getElementById('eMediaList'); list.innerHTML = '';
                (loc.media || []).forEach(m => addMediaField(m.url));
            } else {
                main.classList.remove('hidden'); edit.classList.add('hidden');
            }
        };

        window.addMediaField = (val = '') => {
            const div = document.createElement('div'); div.className = 'flex gap-3';
            div.innerHTML = `
                <input type="text" class="flex-1 p-4 bg-white border border-slate-100 rounded-xl text-sm shadow-sm" placeholder="貼上圖片網址" value="${val}">
                <button onclick="this.parentElement.remove()" class="text-rose-400 hover:text-rose-600 transition-colors px-2"><i class="fa-solid fa-trash-can"></i></button>
            `;
            document.getElementById('eMediaList').appendChild(div);
        };

        window.saveChanges = async () => {
            const loc = locations.find(l => l.id === currentId);
            const media = Array.from(document.querySelectorAll('#eMediaList div input')).map(i => ({ type: 'image', url: i.value })).filter(m => m.url);
            const isPublic = document.getElementById('ePublic').checked;
            const data = {
                title: document.getElementById('eTitle').value,
                date: document.getElementById('eDate').value,
                description: document.getElementById('eDesc').value,
                media: media, isPublic: isPublic,
                lat: loc.lat, lng: loc.lng, userId: auth.currentUser.uid,
                updatedAt: serverTimestamp()
            };

            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId), data);
            const pubRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId);
            if (isPublic) await setDoc(pubRef, data); else await deleteDoc(pubRef).catch(() => {});
            
            showToast("足跡已更新"); toggleEditMode();
        };

        window.addNewLocation = async () => {
            const center = map.getCenter();
            const res = await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations'), {
                title: "新的足跡", date: new Date().toISOString().split('T')[0],
                lat: center.lat, lng: center.lng, media: [], isPublic: false,
                userId: auth.currentUser.uid
            });
            currentId = res.id; toggleEditMode();
        };

        window.deleteLoc = async () => {
            if(!confirm("確定要永遠刪除此足跡嗎？")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId));
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId)).catch(()=>{});
            resetDetail(); showToast("已刪除足跡");
        };

        function resetDetail() {
            currentId = null;
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('editMode').classList.add('hidden');
            document.getElementById('emptyContent').classList.remove('hidden');
        }

        function updateMarkers() {
            markersLayer.clearLayers();
            locations.forEach(loc => {
                const icon = L.divIcon({
                    html: `<div class="relative transition-transform duration-300 ${currentId===loc.id?'scale-125':''}"><i class="fa-solid fa-location-dot ${currentId===loc.id?'text-indigo-600':'text-rose-500'} text-2xl drop-shadow-lg"></i>${loc.isPublic && viewMode==='private'?'<div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-emerald-400 rounded-full border-2 border-white"></div>':''}</div>`,
                    className: '', iconAnchor: [12, 24]
                });
                L.marker([loc.lat, loc.lng], { icon }).addTo(markersLayer).on('click', () => selectLoc(loc.id));
            });
        }

        function convertUrl(url) {
            if (!url) return '';
            if (url.includes("drive.google.com")) {
                const id = url.match(/\/file\/d\/(.+?)\//)?.[1] || url.match(/id=(.+?)(&|$)/)?.[1];
                return id ? `https://drive.google.com/uc?export=download&id=${id}` : url;
            }
            return url;
        }

        window.loginWithGoogle = () => signInWithPopup(auth, googleProvider).then(() => closeAuthModal()).catch(e=>console.error(e));
        window.openAuthModal = () => document.getElementById('authModal').style.display = 'flex';
        window.closeAuthModal = () => document.getElementById('authModal').style.display = 'none';
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }

        window.onload = initMap;
    </script>
</body>
</html>
