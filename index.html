<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>足跡管理者中心 - 座標編輯功能</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        #app-container { display: flex; flex-direction: row; height: 100vh; width: 100%; }
        
        /* 側邊欄 */
        .sidebar-admin { width: 380px; height: 100%; display: flex; flex-direction: column; border-right: 1px solid #e2e8f0; background: #fff; z-index: 60; flex-shrink: 0; }
        .layer-1 { height: 70px; background: #1e293b; display: flex; align-items: center; padding: 0 1.25rem; z-index: 50; flex-shrink: 0; }
        .layer-2 { height: 320px; position: relative; background: #e2e8f0; flex-shrink: 0; border-bottom: 4px solid #f1f5f9; }
        .layer-3 { flex: 1; background: #ffffff; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 地圖高度與容器 */
        #main-map { height: 100%; width: 100%; }
        #edit-picker-map { height: 250px; width: 100%; border-radius: 20px; margin-top: 10px; border: 2px solid #f1f5f9; }

        .main-content-view { flex: 1; height: 100%; overflow-y: auto; background: #fcfcfd; position: relative; scroll-behavior: smooth; }

        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            #app-container { flex-direction: column; height: auto; }
            .sidebar-admin { width: 100%; height: auto; min-height: 100vh; }
            .layer-2 { height: 350px !important; }
        }

        #locationScroller { flex-direction: column; overflow-y: auto; padding: 1rem; gap: 8px; display: flex; }
        .date-divider { padding: 20px 8px 10px 8px; font-size: 11px; font-weight: 900; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        .date-divider::after { content: ""; flex: 1; height: 1px; background: #f1f5f9; }

        .loc-item { width: 100%; display: flex; align-items: center; padding: 12px; background: #fff; border-radius: 12px; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .loc-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #f1f5f9; }
        .loc-item p { font-size: 15px; margin-left: 12px; font-weight: 700; color: #334155; }
        .loc-active { background-color: #f0f3ff !important; border-color: #6366f1 !important; }

        /* 上傳網格 */
        .upload-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .upload-preview { position: relative; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; }
        .upload-preview img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img-btn { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: #ef4444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
        .upload-placeholder { aspect-ratio: 1/1; border: 2px dashed #cbd5e1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; cursor: pointer; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: #1e293b; color: white; border-radius: 12px; z-index: 10001; display: none; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .toggle-btn { position: relative; display: inline-block; width: 44px; height: 22px; }
        .toggle-btn input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(22px); }

        .media-scroller { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .media-card { flex: 0 0 300px; height: 200px; border-radius: 16px; overflow: hidden; background: #eee; }
        .media-card img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p id="loadingText" class="mt-4 font-bold text-slate-600">正在處理...</p>
    </div>

    <div id="toast" class="toast">訊息提示</div>

    <div id="app-container">
        <!-- 側邊欄 -->
        <div class="sidebar-admin">
            <header class="layer-1">
                <div id="userProfile" onclick="handleAuthClick()" class="flex items-center gap-3 cursor-pointer">
                    <div id="userAvatar" class="w-10 h-10 rounded-xl bg-slate-700 flex items-center justify-center text-white overflow-hidden">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="flex flex-col">
                        <h1 id="userName" class="text-white font-black text-sm">訪客</h1>
                        <span id="authStatusLabel" class="text-[9px] text-slate-400 font-bold uppercase">點擊登入</span>
                    </div>
                </div>
            </header>

            <section class="layer-2">
                <div id="main-map"></div>
            </section>

            <section class="layer-3">
                <div class="p-4 border-b">
                    <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
                        <button onclick="switchViewMode('public')" id="btnPublic" class="flex-1 py-2 rounded-lg text-[11px] font-black nav-active">公開展區</button>
                        <button onclick="switchViewMode('private')" id="btnPrivate" class="hidden flex-1 py-2 rounded-lg text-[11px] font-black text-slate-500">我的後台</button>
                    </div>
                </div>
                <div id="locationScroller"></div>
            </section>
        </div>

        <!-- 主要顯示區 -->
        <div id="contentView" class="main-content-view">
            <!-- 預設畫面 -->
            <div id="emptyContent" class="h-full flex flex-col items-center justify-center text-slate-300 p-10 text-center">
                <i class="fa-solid fa-map-location-dot text-6xl opacity-10 mb-6"></i>
                <h3 class="text-slate-900 font-black text-xl">點擊地點開始旅程</h3>
            </div>

            <!-- 足跡詳情 -->
            <div id="mainContent" class="hidden p-8 md:p-16 max-w-4xl mx-auto space-y-10">
                <div class="flex justify-between items-start">
                    <div class="space-y-2">
                        <span id="cDate" class="text-indigo-600 font-black text-xs bg-indigo-50 px-3 py-1 rounded-full"></span>
                        <h2 id="cTitle" class="text-5xl font-black text-slate-900 tracking-tighter"></h2>
                    </div>
                    <div id="adminTools" class="hidden">
                        <button onclick="toggleEditMode()" class="w-12 h-12 bg-white shadow-lg rounded-xl flex items-center justify-center text-indigo-600"><i class="fa-solid fa-pen"></i></button>
                    </div>
                </div>
                <div id="cMedia" class="media-scroller"></div>
                <p id="cDesc" class="text-slate-600 text-lg leading-relaxed whitespace-pre-wrap"></p>
            </div>

            <!-- 編輯介面 -->
            <div id="editMode" class="hidden p-6 md:p-12 bg-slate-50 min-h-full">
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-[2rem] shadow-xl space-y-6">
                    <h3 class="text-2xl font-black text-slate-900">編輯定位與內容</h3>
                    
                    <!-- 地圖定位器 -->
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">1. 地圖定位 (點擊地圖選擇位置)</label>
                        <div id="edit-picker-map"></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] text-slate-400 block mb-1">緯度 (Latitude)</label><input type="number" id="eLat" step="any" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-mono"></div>
                            <div><label class="text-[10px] text-slate-400 block mb-1">經度 (Longitude)</label><input type="number" id="eLng" step="any" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-mono"></div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                        <span class="font-bold text-sm">公開展示</span>
                        <label class="toggle-btn"><input type="checkbox" id="eIsPublic"><span class="slider"></span></label>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-[11px] font-black text-slate-400 block mb-2 uppercase">媒體圖片</label>
                            <div class="upload-grid" id="editMediaGrid">
                                <div class="upload-placeholder" onclick="document.getElementById('mediaInput').click()"><i class="fa-solid fa-plus text-lg"></i></div>
                            </div>
                            <input type="file" id="mediaInput" class="hidden" accept="image/*" multiple onchange="handleFileSelection(event)">
                        </div>
                        <input type="text" id="eTitle" placeholder="足跡名稱" class="w-full p-4 bg-slate-50 border rounded-xl font-bold">
                        <input type="date" id="eDate" class="w-full p-4 bg-slate-50 border rounded-xl font-bold">
                        <textarea id="eDesc" rows="5" placeholder="說說當時的故事..." class="w-full p-4 bg-slate-50 border rounded-xl"></textarea>
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button onclick="saveChanges()" class="flex-1 py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">儲存更新</button>
                        <button onclick="toggleEditMode()" class="px-8 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBFBhaRtjzBcav9dI7TfNt0E2ZjjUW1b28", authDomain: "mytraveljournal-74571.firebaseapp.com", projectId: "mytraveljournal-74571", appId: "1:1056167338813:web:8dd15d6d1dae9e8efb5b54" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = 'mytraveljournal-74571';

        let locations = [];
        let currentId = null;
        let mainMap, editMap, mainMarkersLayer, editMarker;
        let viewMode = 'public';
        let unsub = null;
        let currentEditingMedia = [];

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const MAX = 1600;
                        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                };
            });
        }

        function initMaps() {
            // 主地圖
            mainMap = L.map('main-map', { center: [20, 0], zoom: 2, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
            mainMarkersLayer = L.layerGroup().addTo(mainMap);

            // 編輯定位地圖
            editMap = L.map('edit-picker-map', { center: [20, 0], zoom: 2 });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(editMap);
            
            editMap.on('click', (e) => {
                setEditCoords(e.latlng.lat, e.latlng.lng);
            });
        }

        function setEditCoords(lat, lng) {
            document.getElementById('eLat').value = lat.toFixed(6);
            document.getElementById('eLng').value = lng.toFixed(6);
            if (editMarker) editMap.removeLayer(editMarker);
            editMarker = L.marker([lat, lng]).addTo(editMap);
        }

        window.handleAuthClick = () => {
            if (auth.currentUser) { if(confirm("確定登出？")) signOut(auth); }
            else { signInWithPopup(auth, provider); }
        };

        onAuthStateChanged(auth, (user) => {
            const btnPrivate = document.getElementById('btnPrivate');
            if (user) {
                document.getElementById('userAvatar').innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                document.getElementById('userName').innerText = user.displayName;
                btnPrivate.style.display = 'block'; switchViewMode('private');
            } else {
                document.getElementById('userAvatar').innerHTML = `<i class="fa-solid fa-user"></i>`;
                document.getElementById('userName').innerText = "訪客";
                btnPrivate.style.display = 'none'; switchViewMode('public');
            }
        });

        window.switchViewMode = (mode) => {
            viewMode = mode;
            document.getElementById('btnPublic').className = mode === 'public' ? 'flex-1 py-2 rounded-lg text-[11px] font-black bg-indigo-600 text-white' : 'flex-1 py-2 rounded-lg text-[11px] font-black text-slate-500';
            document.getElementById('btnPrivate').className = mode === 'private' ? 'flex-1 py-2 rounded-lg text-[11px] font-black bg-indigo-600 text-white' : 'flex-1 py-2 rounded-lg text-[11px] font-black text-slate-500';
            loadData();
        };

        function loadData() {
            if (unsub) unsub();
            let ref = (viewMode === 'public' || !auth.currentUser) 
                ? collection(db, 'artifacts', appId, 'public', 'data', 'locations')
                : collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations');

            unsub = onSnapshot(ref, (snap) => {
                locations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (viewMode === 'public') locations = locations.filter(l => l.isPublic);
                locations.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
                renderList();
                updateMainMarkers();
            });
        }

        function renderList() {
            const container = document.getElementById('locationScroller');
            container.innerHTML = '';
            locations.forEach(loc => {
                const item = document.createElement('div');
                item.className = `loc-item ${currentId === loc.id ? 'loc-active' : ''}`;
                item.innerHTML = `<img src="${(loc.media && loc.media[0]) ? loc.media[0].url : ''}" class="loc-thumb" onerror="this.src='https://ui-avatars.com/api/?name=Spot'"><p class="truncate">${loc.title}</p>`;
                item.onclick = () => selectLoc(loc.id);
                container.appendChild(item);
            });
        }

        function selectLoc(id) {
            currentId = id;
            const loc = locations.find(l => l.id === id);
            if (!loc) return;
            document.getElementById('emptyContent').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('editMode').classList.add('hidden');
            document.getElementById('adminTools').style.display = (auth.currentUser && viewMode === 'private') ? 'block' : 'none';
            
            document.getElementById('cTitle').innerText = loc.title;
            document.getElementById('cDate').innerText = loc.date;
            document.getElementById('cDesc').innerText = loc.description;
            const media = document.getElementById('cMedia');
            media.innerHTML = '';
            (loc.media || []).forEach(m => {
                media.innerHTML += `<div class="media-card"><img src="${m.url}"></div>`;
            });

            renderList();
            updateMainMarkers();
            if (loc.lat && loc.lng) mainMap.flyTo([loc.lat, loc.lng], 14);
        }

        function updateMainMarkers() {
            mainMarkersLayer.clearLayers();
            locations.forEach(loc => {
                if (!loc.lat || !loc.lng) return;
                const icon = L.divIcon({
                    html: `<i class="fa-solid fa-location-dot ${currentId === loc.id ? 'text-indigo-600 scale-125' : 'text-rose-500'} text-2xl"></i>`,
                    className: '', iconAnchor: [12, 24]
                });
                L.marker([loc.lat, loc.lng], { icon }).addTo(mainMarkersLayer).on('click', () => selectLoc(loc.id));
            });
        }

        window.toggleEditMode = () => {
            const edit = document.getElementById('editMode');
            const main = document.getElementById('mainContent');
            if (edit.classList.contains('hidden')) {
                const loc = locations.find(l => l.id === currentId);
                main.classList.add('hidden');
                edit.classList.remove('hidden');
                
                document.getElementById('eTitle').value = loc.title;
                document.getElementById('eDate').value = loc.date || "";
                document.getElementById('eDesc').value = loc.description || "";
                document.getElementById('eIsPublic').checked = loc.isPublic || false;
                document.getElementById('eLat').value = loc.lat || "";
                document.getElementById('eLng').value = loc.lng || "";
                
                currentEditingMedia = [...(loc.media || [])];
                renderEditMedia();

                // 更新編輯地圖視角
                setTimeout(() => {
                    editMap.invalidateSize();
                    if (loc.lat && loc.lng) {
                        setEditCoords(loc.lat, loc.lng);
                        editMap.setView([loc.lat, loc.lng], 10);
                    }
                }, 100);
            } else {
                edit.classList.add('hidden');
                main.classList.remove('hidden');
            }
        };

        window.handleFileSelection = async (e) => {
            const files = Array.from(e.target.files);
            document.getElementById('loadingOverlay').style.display = 'flex';
            for (let f of files) {
                const url = await compressImage(f);
                currentEditingMedia.push({ url });
            }
            renderEditMedia();
            document.getElementById('loadingOverlay').style.display = 'none';
        };

        function renderEditMedia() {
            const grid = document.getElementById('editMediaGrid');
            const ph = grid.querySelector('.upload-placeholder');
            grid.innerHTML = '';
            currentEditingMedia.forEach((m, i) => {
                grid.innerHTML += `<div class="upload-preview"><img src="${m.url}"><div class="remove-img-btn" onclick="removeMedia(${i})">×</div></div>`;
            });
            grid.appendChild(ph);
        }

        window.removeMedia = (i) => { currentEditingMedia.splice(i, 1); renderEditMedia(); };

        window.saveChanges = async () => {
            document.getElementById('loadingOverlay').style.display = 'flex';
            const lat = parseFloat(document.getElementById('eLat').value);
            const lng = parseFloat(document.getElementById('eLng').value);
            const isPub = document.getElementById('eIsPublic').checked;

            const data = {
                title: document.getElementById('eTitle').value,
                date: document.getElementById('eDate').value,
                description: document.getElementById('eDesc').value,
                lat, lng,
                isPublic: isPub,
                media: currentEditingMedia,
                updatedAt: serverTimestamp()
            };

            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId), data, {merge:true});
                const pubDoc = doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId);
                if (isPub) await setDoc(pubDoc, data, {merge:true});
                else await deleteDoc(pubDoc).catch(()=>{});
                
                showToast("更新成功！");
                toggleEditMode();
            } catch(e) {
                showToast("儲存失敗，請檢查圖片大小");
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        window.onload = initMaps;
    </script>
</body>
</html>
