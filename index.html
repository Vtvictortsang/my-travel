<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊足跡 - 縮圖回歸版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        #map { height: 100%; width: 100%; z-index: 5; background-color: #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem;
            background: #334155; color: white; border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 1000; display: none;
        }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .media-item {
            width: 100%; height: 220px;
            border-radius: 16px; overflow: hidden;
            background: #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: relative; border: 1px solid #e2e8f0;
        }
        .media-img, .media-video { width: 100%; height: 100%; object-fit: cover; background: black; }
        .image-input-group {
            background: #f8fafc; padding: 16px; border-radius: 16px;
            border: 1px solid #e2e8f0; margin-bottom: 12px;
        }
        /* 列表縮圖樣式 */
        .list-thumb {
            width: 48px; height: 48px; border-radius: 10px;
            object-fit: cover; background: #e2e8f0; flex-shrink: 0;
        }
        .list-icon-placeholder {
            width: 48px; height: 48px; border-radius: 10px;
            background: #f1f5f9; display: flex; items-center; justify-center;
            color: #cbd5e1; flex-shrink: 0;
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <div id="toast" class="toast">訊息內容</div>

    <!-- 左側欄 -->
    <aside class="w-full md:w-80 bg-white border-b md:border-b-0 md:border-r border-slate-200 flex flex-col h-[30vh] md:h-full z-10 shadow-sm shrink-0">
        <div class="p-4 bg-indigo-600 text-white flex justify-between items-center shrink-0">
            <h1 class="font-bold text-lg"><i class="fa-solid fa-earth-asia mr-2"></i>旅遊足跡</h1>
            <button onclick="addNewLocation()" class="p-2 bg-indigo-500 hover:bg-indigo-400 rounded-lg">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        <div id="locationList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-2"></div>
    </aside>

    <!-- 右側欄 -->
    <main class="flex-1 flex flex-col h-[70vh] md:h-full overflow-hidden bg-slate-50">
        <div class="h-1/3 shrink-0 relative border-b border-slate-200">
            <div id="map"></div>
        </div>
        
        <div class="h-2/3 overflow-y-auto custom-scrollbar p-4 md:p-8">
            <div id="emptyState" class="flex flex-col items-center justify-center h-full text-slate-300">
                <i class="fa-solid fa-map-location text-6xl mb-4 opacity-20"></i>
                <p>選擇地點來開啟或編輯回憶</p>
            </div>

            <div id="contentView" class="hidden max-w-6xl mx-auto space-y-8">
                <div id="displaySection" class="space-y-6">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h2 id="displayTitle" class="text-4xl font-black text-slate-800"></h2>
                        <div class="flex space-x-2">
                            <button onclick="toggleEditMode()" class="px-5 py-2.5 bg-white border border-slate-200 rounded-xl shadow-sm font-medium">編輯內容</button>
                            <button onclick="deleteCurrentLocation()" class="p-2.5 bg-red-50 text-red-500 rounded-xl"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                    <div id="mediaGallery" class="media-grid"></div>
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
                        <h3 class="text-xs font-bold text-indigo-500 mb-4 tracking-widest uppercase">旅途故事</h3>
                        <div id="displayDescription" class="text-slate-700 leading-loose whitespace-pre-wrap text-lg font-light"></div>
                    </div>
                </div>

                <div id="editForm" class="hidden bg-white rounded-3xl shadow-xl p-6 md:p-10 space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label class="block text-sm font-bold">地點名稱</label>
                            <input type="text" id="editTitleInput" class="w-full p-4 border border-slate-200 rounded-2xl outline-none" placeholder="輸入地點...">
                        </div>
                        <div class="space-y-3">
                            <label class="block text-sm font-bold">座標定位</label>
                            <div id="coordDisplay" class="w-full p-4 bg-slate-50 border border-slate-100 text-slate-500 rounded-2xl font-mono text-sm">點擊地圖選取位置</div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <label class="block text-sm font-bold">媒體連結 (支援 Google Drive 分享連結)</label>
                            <div class="flex gap-2">
                                <button onclick="addMediaInput('image')" class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-xl font-bold text-xs">加入相片網址</button>
                                <button onclick="addMediaInput('video')" class="bg-amber-50 text-amber-700 px-4 py-2 rounded-xl font-bold text-xs">加入影片網址</button>
                            </div>
                        </div>
                        <div id="mediaInputsContainer" class="space-y-3"></div>
                        <p class="text-[10px] text-slate-400">※ Google Drive 影片請確保設為「知道連結的任何人皆可查看」。</p>
                    </div>

                    <div class="space-y-3">
                        <label class="block text-sm font-bold">故事內容</label>
                        <textarea id="editDescInput" rows="6" class="w-full p-4 border border-slate-200 rounded-2xl outline-none" placeholder="寫下回憶..."></textarea>
                    </div>
                    
                    <div class="flex gap-4 pt-4">
                        <button id="saveBtn" onclick="saveChanges()" class="flex-[2] bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg">儲存足跡</button>
                        <button onclick="toggleEditMode()" class="flex-1 py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl">放棄</button>
                    </div>
                </div>
            </div>
            <div class="h-24"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFBhaRtjzBcav9dI7TfNt0E2ZjjUW1b28",
            authDomain: "mytraveljournal-74571.firebaseapp.com",
            projectId: "mytraveljournal-74571",
            storageBucket: "mytraveljournal-74571.firebasestorage.app",
            messagingSenderId: "1056167338813",
            appId: "1:1056167338813:web:8dd15d6d1dae9e8efb5b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'mytraveljournal-74571';

        let locations = [];
        let currentId = null;
        let map, markersLayer, tempMarker;

        // 自動轉換 Google Drive 連結
        function convertDriveUrl(url) {
            if (!url) return "";
            if (url.includes("drive.google.com")) {
                const match = url.match(/\/file\/d\/(.+?)\/(view|edit)/) || url.match(/id=(.+?)(&|$)/);
                if (match && match[1]) {
                    return `https://drive.google.com/uc?export=download&id=${match[1]}`;
                }
            }
            return url;
        }

        function initMap() {
            map = L.map('map', { center: [22.3193, 114.1694], zoom: 3 });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: 'CARTO' }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            map.on('click', (e) => {
                if (!document.getElementById('editForm').classList.contains('hidden')) updateTempMarker(e.latlng.lat, e.latlng.lng);
            });
        }

        window.addMediaInput = function(type, val = '') {
            const container = document.getElementById('mediaInputsContainer');
            const div = document.createElement('div');
            div.className = 'image-input-group flex items-center gap-3';
            div.dataset.type = type;
            div.innerHTML = `
                <div class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm shrink-0">
                    <i class="fa-solid ${type === 'image' ? 'fa-image text-indigo-500' : 'fa-video text-amber-500'}"></i>
                </div>
                <input type="text" class="media-url-input flex-1 p-3 border border-slate-200 rounded-xl text-xs" 
                       placeholder="貼上網址..." value="${val}">
                <button onclick="this.parentElement.remove()" class="p-2 text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
            `;
            container.appendChild(div);
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'locations'), (snap) => {
                    locations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderList();
                    updateMarkers();
                    if (currentId) selectLoc(currentId, false);
                });
            } else signInAnonymously(auth);
        });

        // 更新列表渲染：加入縮圖邏輯
        function renderList() {
            const list = document.getElementById('locationList');
            list.innerHTML = locations.length ? '' : '<div class="p-8 text-center text-slate-400 text-sm">無紀錄</div>';
            
            locations.forEach(loc => {
                const isActive = currentId === loc.id;
                const div = document.createElement('div');
                div.className = `p-3 cursor-pointer rounded-2xl flex items-center gap-3 transition-all ${isActive ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-50 text-slate-600'}`;
                
                // 決定縮圖內容
                let thumbHtml = `<div class="list-icon-placeholder"><i class="fa-solid fa-location-dot"></i></div>`;
                if (loc.media && loc.media.length > 0) {
                    const firstMedia = loc.media[0];
                    if (firstMedia.type === 'image') {
                        thumbHtml = `<img src="${convertDriveUrl(firstMedia.url)}" class="list-thumb" onerror="this.outerHTML='<div class=list-icon-placeholder><i class=\'fa-solid fa-image\'></i></div>'">`;
                    } else {
                        // 影片縮圖暫時以圖標代替
                        thumbHtml = `<div class="list-icon-placeholder" style="background:#fff1f2"><i class="fa-solid fa-circle-play text-rose-400"></i></div>`;
                    }
                }

                div.innerHTML = `
                    ${thumbHtml}
                    <div class="flex-1 min-w-0">
                        <p class="font-bold truncate text-sm">${loc.title || '未命名'}</p>
                        <p class="text-[10px] opacity-60 truncate">${loc.description?.substring(0, 20) || '點擊查看回憶'}</p>
                    </div>
                `;
                div.onclick = () => selectLoc(loc.id);
                list.appendChild(div);
            });
        }

        function updateMarkers() {
            markersLayer.clearLayers();
            locations.forEach(loc => {
                if (loc.lat && loc.lng) {
                    const m = L.marker([loc.lat, loc.lng], {
                        icon: L.divIcon({
                            html: `<i class="fa-solid fa-location-dot ${currentId === loc.id ? 'text-indigo-600 scale-150' : 'text-red-500'} text-3xl"></i>`,
                            className: '', iconSize: [30, 30], iconAnchor: [15, 30]
                        })
                    });
                    m.on('click', () => selectLoc(loc.id));
                    markersLayer.addLayer(m);
                }
            });
        }

        window.selectLoc = function(id, shouldFly = true) {
            currentId = id;
            const loc = locations.find(l => l.id === id);
            if (!loc) return;
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('contentView').classList.remove('hidden');
            document.getElementById('displaySection').classList.remove('hidden');
            document.getElementById('editForm').classList.add('hidden');
            document.getElementById('displayTitle').innerText = loc.title;
            document.getElementById('displayDescription').innerText = loc.description || "暫無故事...";
            const gallery = document.getElementById('mediaGallery');
            gallery.innerHTML = '';
            if (loc.media) {
                loc.media.forEach(m => {
                    const container = document.createElement('div');
                    container.className = 'media-item';
                    const playUrl = convertDriveUrl(m.url);
                    if (m.type === 'image') container.innerHTML = `<img src="${playUrl}" class="media-img" onclick="window.open('${playUrl}','_blank')">`;
                    else container.innerHTML = `<video src="${playUrl}" class="media-video" controls playsinline></video>`;
                    gallery.appendChild(container);
                });
            }
            if (shouldFly && loc.lat) map.flyTo([loc.lat, loc.lng], 10);
            renderList(); updateMarkers();
        };

        window.addNewLocation = async () => {
            const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'locations'), {
                title: "新地點", description: "", media: [], lat: map.getCenter().lat, lng: map.getCenter().lng, createdAt: serverTimestamp()
            });
            currentId = docRef.id;
            toggleEditMode();
        };

        window.toggleEditMode = () => {
            const loc = locations.find(l => l.id === currentId);
            const form = document.getElementById('editForm');
            const display = document.getElementById('displaySection');
            if (form.classList.contains('hidden')) {
                form.classList.remove('hidden'); display.classList.add('hidden');
                document.getElementById('editTitleInput').value = loc.title;
                document.getElementById('editDescInput').value = loc.description;
                document.getElementById('mediaInputsContainer').innerHTML = '';
                if (loc.media) loc.media.forEach(m => addMediaInput(m.type, m.url));
                updateTempMarker(loc.lat, loc.lng);
            } else {
                form.classList.add('hidden'); display.classList.remove('hidden');
                if (tempMarker) map.removeLayer(tempMarker);
            }
        };

        function updateTempMarker(lat, lng) {
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker([lat, lng], { icon: L.divIcon({ html: '<div class="w-6 h-6 bg-indigo-600 rounded-full border-2 border-white shadow"></div>', className: '', iconSize: [24,24], iconAnchor:[12,12] }) }).addTo(map);
            document.getElementById('coordDisplay').innerText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        }

        window.saveChanges = async () => {
            const btn = document.getElementById('saveBtn'); btn.disabled = true;
            const mediaInputs = document.querySelectorAll('.image-input-group');
            const mediaList = Array.from(mediaInputs).map(g => ({ 
                type: g.dataset.type, 
                url: g.querySelector('.media-url-input').value.trim() 
            })).filter(m => m.url);
            
            const data = { title: document.getElementById('editTitleInput').value || "未命名", description: document.getElementById('editDescInput').value, media: mediaList };
            if (tempMarker) { const p = tempMarker.getLatLng(); data.lat = p.lat; data.lng = p.lng; }
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId), data, { merge: true });
            showToast("足跡已同步"); toggleEditMode(); btn.disabled = false;
        };

        window.deleteCurrentLocation = async () => {
            if (confirm("確定刪除？")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId));
                location.reload();
            }
        };

        window.onload = initMap;
    </script>
</body>
</html>
