<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 固定寬度視口，強制手機版以 1280px 的寬度比例呈現，不進行響應式重排 -->
    <meta name="viewport" content="width=1280">
    <title>足跡管理者中心 - 全比例同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        :root { --vh: 1vh; }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; padding: 0; overflow: hidden;
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
            /* 確保內容至少有桌面版寬度 */
            min-width: 1280px; 
        }

        /* --- 基礎佈局架構：固定為橫向分欄 --- */
        #app-container { 
            display: flex; 
            flex-direction: row; /* 強制橫向佈局 */
            height: 100%; 
            width: 100%; 
        }

        /* 側邊欄固定樣式 (原網頁版樣式直接套用) */
        .sidebar-admin { 
            width: 380px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #e2e8f0; 
            background: #fff;
            z-index: 60;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
            flex-shrink: 0;
        }

        .layer-1 { height: 80px; background: #1e293b; display: flex; align-items: center; padding: 0 1.25rem; z-index: 50; flex-shrink: 0; }
        .layer-2 { height: 300px; position: relative; background: #e2e8f0; flex-shrink: 0; }
        .layer-3 { flex: 1; background: #ffffff; display: flex; flex-direction: column; border-top: 1px solid #f1f5f9; overflow: hidden; }
        
        /* 右側詳細內容區 */
        .main-content-view { 
            flex: 1; 
            height: 100%; 
            overflow-y: auto; 
            background: #fcfcfd; 
            position: relative;
        }

        /* 列表項目樣式：統一採用縱向列表 */
        #locationScroller { 
            flex-direction: column; 
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 1rem;
            gap: 12px;
            display: flex;
        }

        .loc-item { 
            width: 100%; 
            display: flex; 
            flex-direction: row;
            align-items: center; 
            text-align: left;
            padding: 12px;
            background: #fff;
            border-radius: 16px;
            border: 1px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }
        .loc-item:hover { background: #f8fafc; border-color: #e2e8f0; }
        .loc-thumb { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; }
        .loc-item p { font-size: 14px; margin: 0 0 0 12px; font-weight: 700; color: #334155; }
        .loc-active { background-color: #f0f3ff !important; border-color: #6366f1 !important; }

        #map { height: 100%; width: 100%; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .media-scroller { display: flex; gap: 16px; overflow-x: auto; padding: 5px 0 20px; }
        .media-card { flex: 0 0 70%; aspect-ratio: 16/10; border-radius: 24px; overflow: hidden; background: #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .media-card img { width: 100%; height: 100%; object-fit: cover; }

        .privacy-badge { font-size: 10px; padding: 4px 12px; border-radius: 30px; font-weight: 800; letter-spacing: 0.05em; }
        .badge-public { background: #ecfdf5; color: #10b981; }
        .badge-private { background: #eef2ff; color: #6366f1; }

        .nav-active { background-color: #6366f1 !important; color: white !important; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; background: #1e293b; color: white;
            border-radius: 12px; z-index: 9999; display: none; font-weight: 600; font-size: 14px;
        }

        .auth-modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8);
            display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">訊息內容</div>

    <div id="authModal" class="auth-modal">
        <div class="w-[400px] bg-white rounded-[2.5rem] p-10 text-center shadow-2xl">
            <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl">
                <i class="fa-solid fa-shield-heart"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">管理者登入</h2>
            <p class="text-slate-400 text-sm mb-8">驗證身份以編輯您的足跡</p>
            <button onclick="loginWithGoogle()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold active:scale-95 transition-all flex items-center justify-center gap-3">
                <i class="fa-brands fa-google"></i> Google 登入
            </button>
            <button onclick="closeAuthModal()" class="mt-6 text-slate-400 text-xs font-bold hover:text-slate-600 transition-colors uppercase tracking-widest">暫不登入，僅瀏覽</button>
        </div>
    </div>

    <div id="app-container">
        <!-- 側邊欄 (管理與列表) -->
        <div class="sidebar-admin">
            <header class="layer-1">
                <div class="flex items-center justify-between w-full">
                    <div id="userProfile" class="flex items-center gap-3 cursor-pointer">
                        <div class="w-9 h-9 rounded-xl bg-slate-700 flex items-center justify-center text-white overflow-hidden">
                            <i class="fa-solid fa-user text-sm"></i>
                        </div>
                        <div class="flex flex-col">
                            <h1 class="text-white font-black text-xs tracking-tight">足跡管理者</h1>
                            <span id="modeStatus" class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Public View Mode</span>
                        </div>
                    </div>
                    <button id="addBtn" onclick="addNewLocation()" class="hidden w-9 h-9 bg-indigo-500 text-white rounded-xl items-center justify-center shadow-lg active:scale-90 transition-all">
                        <i class="fa-solid fa-plus text-sm"></i>
                    </button>
                </div>
            </header>

            <!-- 地圖區域 -->
            <section class="layer-2">
                <div id="map"></div>
            </section>

            <!-- 模式切換與列表 -->
            <section class="layer-3">
                <div class="p-4 flex gap-2 shrink-0 bg-white">
                    <button onclick="switchViewMode('public')" id="btnPublic" class="flex-1 py-2.5 rounded-xl text-[11px] font-black transition-all nav-active">公開展區</button>
                    <button onclick="switchViewMode('private')" id="btnPrivate" class="hidden flex-1 py-2.5 rounded-xl text-[11px] font-black text-slate-400 bg-slate-50 border border-slate-100 transition-all">我的管理</button>
                </div>
                <div id="locationScroller" class="flex-1 custom-scrollbar pb-4 bg-white">
                    <!-- 地點列表由 JS 生成 -->
                </div>
            </section>
        </div>

        <!-- 主內容視圖 -->
        <div class="main-content-view custom-scrollbar">
            <div id="emptyContent" class="h-full flex flex-col items-center justify-center text-slate-300 p-12 text-center">
                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6">
                    <i class="fa-solid fa-map-location-dot text-3xl opacity-20"></i>
                </div>
                <h3 class="text-slate-900 font-black text-lg">準備好出發了嗎？</h3>
                <p class="text-slate-400 text-sm mt-2 font-medium">請在左側選擇一個足跡進行查看</p>
            </div>

            <div id="mainContent" class="hidden">
                <div class="p-16 space-y-12 max-w-5xl mx-auto">
                    <div class="flex justify-between items-start border-b border-slate-100 pb-10">
                        <div class="space-y-4">
                            <div class="flex items-center gap-3">
                                <span id="cDate" class="text-indigo-600 font-black text-[10px] tracking-widest bg-indigo-50 px-3 py-1 rounded-full uppercase"></span>
                                <span id="cBadge" class="privacy-badge"></span>
                            </div>
                            <h2 id="cTitle" class="text-6xl font-black text-slate-900 tracking-tighter leading-tight"></h2>
                        </div>
                        <div id="adminTools" class="hidden flex gap-2">
                            <button onclick="toggleEditMode()" class="w-12 h-12 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center hover:bg-slate-200 transition-colors"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="quickToggleVisibility()" id="cVisibilityBtn" class="w-12 h-12 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center hover:bg-slate-200 transition-colors"><i class="fa-solid fa-eye-slash"></i></button>
                        </div>
                    </div>

                    <div id="cMedia" class="media-scroller custom-scrollbar"></div>

                    <div class="space-y-8">
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">The Story</span>
                            <div class="flex-1 h-[1px] bg-slate-100"></div>
                        </div>
                        <p id="cDesc" class="text-slate-600 text-xl leading-relaxed font-medium whitespace-pre-wrap"></p>
                    </div>
                </div>
            </div>

            <!-- 編輯模式 -->
            <div id="editMode" class="hidden p-16 space-y-8 bg-slate-50 min-h-full">
                <div class="max-w-2xl mx-auto space-y-8 bg-white p-10 rounded-[2.5rem] shadow-sm">
                    <div class="flex items-center justify-between">
                        <h3 class="text-2xl font-black text-slate-900">編輯足跡</h3>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <span class="text-xs font-bold text-slate-500">公開展示</span>
                            <input type="checkbox" id="ePublic" class="w-5 h-5 rounded-lg accent-indigo-600">
                        </label>
                    </div>
                    
                    <div class="space-y-5">
                        <input type="text" id="eTitle" class="w-full p-4 rounded-2xl border-2 border-slate-50 bg-slate-50 focus:bg-white focus:border-indigo-500 outline-none font-bold text-lg transition-all" placeholder="目的地">
                        <input type="date" id="eDate" class="w-full p-4 rounded-2xl border-2 border-slate-50 bg-slate-50 focus:bg-white focus:border-indigo-500 outline-none font-bold transition-all">
                        <textarea id="eDesc" rows="6" class="w-full p-4 rounded-2xl border-2 border-slate-50 bg-slate-50 focus:bg-white focus:border-indigo-500 outline-none text-base leading-relaxed transition-all" placeholder="寫點什麼吧..."></textarea>
                    </div>

                    <div class="space-y-4">
                        <label class="text-[10px] font-black text-slate-400 uppercase block tracking-widest">媒體連結 (圖片網址)</label>
                        <div id="eMediaList" class="space-y-3"></div>
                        <button onclick="addMediaField()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-xs font-black hover:border-indigo-300 hover:text-indigo-400 transition-all bg-white">+ 新增多媒體</button>
                    </div>

                    <div class="flex gap-4 pt-6">
                        <button onclick="saveChanges()" class="flex-[2] py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition-all">儲存更改</button>
                        <button onclick="toggleEditMode()" class="flex-1 py-4 bg-slate-50 text-slate-400 font-bold rounded-2xl border border-slate-100">取消</button>
                    </div>
                    
                    <button onclick="deleteLoc()" class="w-full py-4 text-rose-400 font-bold text-[10px] uppercase tracking-[0.3em] hover:text-rose-600">刪除此足跡</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFBhaRtjzBcav9dI7TfNt0E2ZjjUW1b28",
            authDomain: "mytraveljournal-74571.firebaseapp.com",
            projectId: "mytraveljournal-74571",
            storageBucket: "mytraveljournal-74571.firebasestorage.app",
            messagingSenderId: "1056167338813",
            appId: "1:1056167338813:web:8dd15d6d1dae9e8efb5b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'mytraveljournal-74571';
        const googleProvider = new GoogleAuthProvider();

        let locations = [];
        let currentId = null;
        let map, markersLayer;
        let viewMode = 'public';
        let unsub = null;

        const setVh = () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setVh);
        setVh();

        function initMap() {
            map = L.map('map', { center: [22.3193, 114.1694], zoom: 11, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }

        onAuthStateChanged(auth, (user) => {
            const profile = document.getElementById('userProfile');
            if (user) {
                profile.querySelector('div').innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                profile.onclick = () => { if(confirm("確定要登出嗎？")) signOut(auth); };
                switchViewMode('private');
            } else {
                profile.querySelector('div').innerHTML = `<i class="fa-solid fa-user"></i>`;
                profile.onclick = openAuthModal;
                switchViewMode('public');
            }
        });

        window.switchViewMode = (mode) => {
            viewMode = mode;
            const isPub = mode === 'public';
            document.getElementById('btnPublic').className = isPub ? 'flex-1 py-2.5 rounded-xl text-[11px] font-black transition-all nav-active' : 'flex-1 py-2.5 rounded-xl text-[11px] font-black text-slate-400 bg-slate-50 border border-slate-100';
            document.getElementById('btnPrivate').className = !isPub ? 'flex-1 py-2.5 rounded-xl text-[11px] font-black transition-all nav-active' : 'flex-1 py-2.5 rounded-xl text-[11px] font-black text-slate-400 bg-slate-50 border border-slate-100';
            document.getElementById('modeStatus').innerText = isPub ? 'Public View Mode' : 'Admin Dashboard';
            document.getElementById('addBtn').style.display = (!isPub && auth.currentUser) ? 'flex' : 'none';
            document.getElementById('btnPrivate').style.display = auth.currentUser ? 'flex' : 'none';
            resetDetail(); 
            loadData();
        };

        async function loadData() {
            if (unsub) unsub();
            let ref;
            if (viewMode === 'public') {
                ref = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
            } else {
                ref = collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations');
            }

            unsub = onSnapshot(ref, (snap) => {
                locations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (viewMode === 'public') locations = locations.filter(l => l.isPublic === true);
                locations.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
                renderList(); 
                updateMarkers();
            }, (err) => console.error(err));
        }

        function renderList() {
            const container = document.getElementById('locationScroller');
            container.innerHTML = '';
            locations.forEach(loc => {
                const div = document.createElement('div');
                div.className = `loc-item ${currentId === loc.id ? 'loc-active' : ''}`;
                const thumb = (loc.media && loc.media[0]) ? convertUrl(loc.media[0].url) : 'https://ui-avatars.com/api/?name=Trip&background=random';
                div.innerHTML = `
                    <img src="${thumb}" class="loc-thumb shadow-sm">
                    <p class="truncate">${loc.title}</p>
                `;
                div.onclick = () => selectLoc(loc.id);
                container.appendChild(div);
            });
        }

        window.selectLoc = (id) => {
            currentId = id;
            const loc = locations.find(l => l.id === id);
            if (!loc) return;

            document.getElementById('emptyContent').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('editMode').classList.add('hidden');

            const isAdmin = auth.currentUser && (loc.userId === auth.currentUser.uid || viewMode === 'private');
            document.getElementById('adminTools').style.display = isAdmin ? 'flex' : 'none';

            document.getElementById('cTitle').innerText = loc.title;
            document.getElementById('cDate').innerText = loc.date || "NO DATE";
            document.getElementById('cDesc').innerText = loc.description || "暫無故事內容...";
            document.getElementById('cVisibilityBtn').innerHTML = loc.isPublic ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye text-emerald-500"></i>';

            const badge = document.getElementById('cBadge');
            badge.innerText = loc.isPublic ? "Public" : "Private";
            badge.className = `privacy-badge ${loc.isPublic ? 'badge-public' : 'badge-private'}`;

            const mediaBox = document.getElementById('cMedia');
            mediaBox.innerHTML = '';
            (loc.media || []).forEach(m => {
                const card = document.createElement('div'); card.className = 'media-card';
                card.innerHTML = `<img src="${convertUrl(m.url)}" loading="lazy">`;
                mediaBox.appendChild(card);
            });

            map.flyTo([loc.lat, loc.lng], 14, { duration: 1.5 });
            renderList(); updateMarkers();
        };

        window.quickToggleVisibility = async () => {
            const loc = locations.find(l => l.id === currentId);
            const newState = !loc.isPublic;
            const userRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId);
            await setDoc(userRef, { isPublic: newState }, { merge: true });
            
            const pubRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId);
            if (newState) {
                await setDoc(pubRef, { ...loc, isPublic: true, updatedAt: serverTimestamp() });
            } else {
                await deleteDoc(pubRef).catch(() => {});
            }
            showToast(newState ? "已發佈至公開展區" : "已從公開展區移除");
        };

        window.toggleEditMode = () => {
            const main = document.getElementById('mainContent');
            const edit = document.getElementById('editMode');
            if (edit.classList.contains('hidden')) {
                const loc = locations.find(l => l.id === currentId);
                main.classList.add('hidden'); edit.classList.remove('hidden');
                document.getElementById('eTitle').value = loc.title;
                document.getElementById('eDate').value = loc.date || "";
                document.getElementById('eDesc').value = loc.description || "";
                document.getElementById('ePublic').checked = !!loc.isPublic;
                const list = document.getElementById('eMediaList'); list.innerHTML = '';
                (loc.media || []).forEach(m => addMediaField(m.url));
            } else {
                main.classList.remove('hidden'); edit.classList.add('hidden');
            }
        };

        window.addMediaField = (val = '') => {
            const div = document.createElement('div'); div.className = 'flex gap-2';
            div.innerHTML = `
                <input type="text" class="flex-1 p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs" placeholder="https://..." value="${val}">
                <button onclick="this.parentElement.remove()" class="text-rose-400 px-2"><i class="fa-solid fa-xmark"></i></button>
            `;
            document.getElementById('eMediaList').appendChild(div);
        };

        window.saveChanges = async () => {
            const loc = locations.find(l => l.id === currentId);
            const media = Array.from(document.querySelectorAll('#eMediaList div input')).map(i => ({ type: 'image', url: i.value })).filter(m => m.url);
            const isPublic = document.getElementById('ePublic').checked;
            const data = {
                title: document.getElementById('eTitle').value,
                date: document.getElementById('eDate').value,
                description: document.getElementById('eDesc').value,
                media: media, isPublic: isPublic,
                lat: loc.lat, lng: loc.lng, userId: auth.currentUser.uid,
                updatedAt: serverTimestamp()
            };

            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId), data);
            const pubRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId);
            if (isPublic) await setDoc(pubRef, data); else await deleteDoc(pubRef).catch(() => {});
            
            showToast("足跡資料已儲存"); toggleEditMode();
        };

        window.addNewLocation = async () => {
            const center = map.getCenter();
            const res = await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations'), {
                title: "新地點", date: new Date().toISOString().split('T')[0],
                lat: center.lat, lng: center.lng, media: [], isPublic: false,
                userId: auth.currentUser.uid
            });
            currentId = res.id; 
            setTimeout(() => { selectLoc(res.id); toggleEditMode(); }, 500);
        };

        window.deleteLoc = async () => {
            if(!confirm("確定要永久刪除此足跡數據嗎？")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId));
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId)).catch(()=>{});
            resetDetail(); showToast("數據已刪除");
        };

        function resetDetail() {
            currentId = null;
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('editMode').classList.add('hidden');
            document.getElementById('emptyContent').classList.remove('hidden');
        }

        function updateMarkers() {
            markersLayer.clearLayers();
            locations.forEach(loc => {
                const icon = L.divIcon({
                    html: `<div class="relative transition-all duration-300 ${currentId===loc.id?'scale-125':''}"><i class="fa-solid fa-location-dot ${currentId===loc.id?'text-indigo-600':'text-rose-500'} text-2xl drop-shadow-lg"></i></div>`,
                    className: '', iconAnchor: [12, 24]
                });
                L.marker([loc.lat, loc.lng], { icon }).addTo(markersLayer).on('click', () => selectLoc(loc.id));
            });
        }

        function convertUrl(url) {
            if (!url) return '';
            if (url.includes("drive.google.com")) {
                const id = url.match(/\/file\/d\/(.+?)\//)?.[1] || url.match(/id=(.+?)(&|$)/)?.[1];
                return id ? `https://drive.google.com/uc?export=download&id=${id}` : url;
            }
            return url;
        }

        window.loginWithGoogle = () => signInWithPopup(auth, googleProvider).then(() => closeAuthModal()).catch(e=>console.error(e));
        window.openAuthModal = () => document.getElementById('authModal').style.display = 'flex';
        window.closeAuthModal = () => document.getElementById('authModal').style.display = 'none';
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }

        window.onload = () => {
            initMap();
            loadData();
        };
    </script>
</body>
</html>
