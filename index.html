<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>足跡管理者中心 - 響應式版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        :root { --vh: 1vh; }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; padding: 0;
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
            overflow: hidden;
        }

        /* --- 基礎佈局：預設為橫向分欄 (Desktop) --- */
        #app-container { 
            display: flex; 
            flex-direction: row; 
            height: 100%; 
            width: 100%; 
        }

        /* 側邊欄樣式 */
        .sidebar-admin { 
            width: 380px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #e2e8f0; 
            background: #fff;
            z-index: 60;
            flex-shrink: 0;
        }

        /* 內容區樣式 */
        .main-content-view { 
            flex: 1; 
            height: 100%; 
            overflow-y: auto; 
            background: #fcfcfd; 
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        /* 手機版 (Portrait) 樣式覆蓋 */
        @media (max-width: 768px) {
            #app-container { 
                flex-direction: column; /* 改為直向排版 */
                overflow-y: auto;
            }
            .sidebar-admin { 
                width: 100%; 
                height: 50vh; /* 地圖與列表佔據上半部 */
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
            .main-content-view { 
                width: 100%;
                height: auto;
                min-height: 50vh; /* 內容佔據下半部 */
            }
            .layer-2 { height: 200px !important; } /* 手機地圖縮小一點 */
            .p-16 { padding: 2rem !important; } /* 手機內容間距縮小 */
            #cTitle { font-size: 2.5rem !important; }
        }

        .layer-1 { height: 70px; background: #1e293b; display: flex; align-items: center; padding: 0 1.25rem; z-index: 50; flex-shrink: 0; }
        .layer-2 { height: 280px; position: relative; background: #e2e8f0; flex-shrink: 0; }
        .layer-3 { flex: 1; background: #ffffff; display: flex; flex-direction: column; overflow: hidden; }
        
        #locationScroller { 
            flex-direction: column; 
            overflow-y: auto; 
            padding: 1rem;
            gap: 10px;
            display: flex;
        }

        .loc-item { 
            width: 100%; 
            display: flex; 
            flex-direction: row;
            align-items: center; 
            padding: 10px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
            cursor: pointer;
        }
        .loc-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }
        .loc-item p { font-size: 14px; margin: 0 0 0 10px; font-weight: 700; color: #334155; }
        .loc-active { background-color: #f0f3ff !important; border-color: #6366f1 !important; }

        #map { height: 100%; width: 100%; }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .media-scroller { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; }
        .media-card { flex: 0 0 85%; aspect-ratio: 16/10; border-radius: 16px; overflow: hidden; background: #f1f5f9; }
        .media-card img { width: 100%; height: 100%; object-fit: cover; }

        .privacy-badge { font-size: 10px; padding: 2px 10px; border-radius: 20px; font-weight: 800; }
        .badge-public { background: #ecfdf5; color: #10b981; }
        .badge-private { background: #eef2ff; color: #6366f1; }

        .nav-active { background-color: #6366f1 !important; color: white !important; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: #1e293b; color: white; border-radius: 10px; z-index: 9999; display: none; font-size: 13px; }
    </style>
</head>
<body>

    <div id="toast" class="toast">訊息</div>

    <div id="app-container">
        <!-- 側邊欄 (管理與地圖) -->
        <div class="sidebar-admin">
            <header class="layer-1">
                <div class="flex items-center justify-between w-full">
                    <div id="userProfile" class="flex items-center gap-3 cursor-pointer">
                        <div class="w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center text-white overflow-hidden text-xs">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="flex flex-col">
                            <h1 class="text-white font-black text-xs tracking-tight">足跡管理者</h1>
                        </div>
                    </div>
                    <button id="addBtn" onclick="addNewLocation()" class="hidden w-8 h-8 bg-indigo-500 text-white rounded-lg items-center justify-center shadow-lg active:scale-90 transition-all">
                        <i class="fa-solid fa-plus text-xs"></i>
                    </button>
                </div>
            </header>

            <section class="layer-2">
                <div id="map"></div>
            </section>

            <section class="layer-3">
                <div class="p-3 flex gap-2 shrink-0 bg-white">
                    <button onclick="switchViewMode('public')" id="btnPublic" class="flex-1 py-2 rounded-lg text-[10px] font-black transition-all nav-active">公開展區</button>
                    <button onclick="switchViewMode('private')" id="btnPrivate" class="hidden flex-1 py-2 rounded-lg text-[10px] font-black text-slate-400 bg-slate-50 border border-slate-100 transition-all">我的管理</button>
                </div>
                <div id="locationScroller" class="flex-1 custom-scrollbar bg-white"></div>
            </section>
        </div>

        <!-- 主內容視圖 -->
        <div class="main-content-view custom-scrollbar">
            <div id="emptyContent" class="h-full min-h-[40vh] flex flex-col items-center justify-center text-slate-300 p-10 text-center">
                <i class="fa-solid fa-map-location-dot text-4xl opacity-10 mb-4"></i>
                <h3 class="text-slate-900 font-black text-base">請選擇足跡</h3>
            </div>

            <div id="mainContent" class="hidden">
                <div class="p-8 md:p-16 space-y-8 max-w-4xl mx-auto">
                    <div class="flex justify-between items-start border-b border-slate-100 pb-8">
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <span id="cDate" class="text-indigo-600 font-black text-[9px] tracking-widest bg-indigo-50 px-2 py-0.5 rounded-full"></span>
                                <span id="cBadge" class="privacy-badge"></span>
                            </div>
                            <h2 id="cTitle" class="text-4xl md:text-6xl font-black text-slate-900 tracking-tighter"></h2>
                        </div>
                        <div id="adminTools" class="hidden flex gap-2">
                            <button onclick="toggleEditMode()" class="w-10 h-10 bg-slate-100 text-slate-600 rounded-lg flex items-center justify-center"><i class="fa-solid fa-pen text-xs"></i></button>
                        </div>
                    </div>

                    <div id="cMedia" class="media-scroller custom-scrollbar"></div>

                    <div class="space-y-6">
                        <p id="cDesc" class="text-slate-600 text-lg leading-relaxed whitespace-pre-wrap"></p>
                    </div>
                </div>
            </div>

            <!-- 編輯模式 (手機版會以全螢幕浮層感呈現) -->
            <div id="editMode" class="hidden p-6 md:p-16 space-y-6 bg-slate-50 min-h-full">
                <div class="max-w-xl mx-auto space-y-6 bg-white p-6 md:p-10 rounded-[2rem] shadow-sm">
                    <h3 class="text-xl font-black text-slate-900">編輯內容</h3>
                    <input type="text" id="eTitle" class="w-full p-4 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white outline-none font-bold" placeholder="目的地">
                    <input type="date" id="eDate" class="w-full p-4 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white outline-none">
                    <textarea id="eDesc" rows="5" class="w-full p-4 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white outline-none" placeholder="描述內容..."></textarea>
                    
                    <div class="flex gap-3">
                        <button onclick="saveChanges()" class="flex-1 py-4 bg-indigo-600 text-white font-black rounded-xl">儲存</button>
                        <button onclick="toggleEditMode()" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-xl">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFBhaRtjzBcav9dI7TfNt0E2ZjjUW1b28",
            authDomain: "mytraveljournal-74571.firebaseapp.com",
            projectId: "mytraveljournal-74571",
            appId: "1:1056167338813:web:8dd15d6d1dae9e8efb5b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'mytraveljournal-74571';
        const googleProvider = new GoogleAuthProvider();

        let locations = [];
        let currentId = null;
        let map, markersLayer;
        let viewMode = 'public';
        let unsub = null;

        const setVh = () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setVh);
        setVh();

        function initMap() {
            map = L.map('map', { center: [22.3193, 114.1694], zoom: 11, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }

        onAuthStateChanged(auth, (user) => {
            const profile = document.getElementById('userProfile');
            if (user) {
                profile.querySelector('div').innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                switchViewMode('private');
            } else {
                profile.querySelector('div').innerHTML = `<i class="fa-solid fa-user"></i>`;
                switchViewMode('public');
            }
        });

        window.switchViewMode = (mode) => {
            viewMode = mode;
            const isPub = mode === 'public';
            document.getElementById('btnPublic').className = isPub ? 'flex-1 py-2 rounded-lg text-[10px] font-black nav-active' : 'flex-1 py-2 rounded-lg text-[10px] font-black text-slate-400 bg-slate-50 border border-slate-100';
            document.getElementById('btnPrivate').className = !isPub ? 'flex-1 py-2 rounded-lg text-[10px] font-black nav-active' : 'flex-1 py-2 rounded-lg text-[10px] font-black text-slate-400 bg-slate-50 border border-slate-100';
            document.getElementById('addBtn').style.display = (!isPub && auth.currentUser) ? 'flex' : 'none';
            document.getElementById('btnPrivate').style.display = auth.currentUser ? 'flex' : 'none';
            loadData();
        };

        async function loadData() {
            if (unsub) unsub();
            let ref = viewMode === 'public' 
                ? collection(db, 'artifacts', appId, 'public', 'data', 'locations')
                : collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations');

            unsub = onSnapshot(ref, (snap) => {
                locations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (viewMode === 'public') locations = locations.filter(l => l.isPublic === true);
                locations.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
                renderList(); 
                updateMarkers();
            });
        }

        function renderList() {
            const container = document.getElementById('locationScroller');
            container.innerHTML = '';
            locations.forEach(loc => {
                const div = document.createElement('div');
                div.className = `loc-item ${currentId === loc.id ? 'loc-active' : ''}`;
                const thumb = (loc.media && loc.media[0]) ? loc.media[0].url : 'https://ui-avatars.com/api/?name=T';
                div.innerHTML = `<img src="${thumb}" class="loc-thumb"><p class="truncate">${loc.title}</p>`;
                div.onclick = () => selectLoc(loc.id);
                container.appendChild(div);
            });
        }

        window.selectLoc = (id) => {
            currentId = id;
            const loc = locations.find(l => l.id === id);
            if (!loc) return;

            document.getElementById('emptyContent').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('editMode').classList.add('hidden');

            const isAdmin = auth.currentUser && (viewMode === 'private');
            document.getElementById('adminTools').style.display = isAdmin ? 'flex' : 'none';

            document.getElementById('cTitle').innerText = loc.title;
            document.getElementById('cDate').innerText = loc.date || "";
            document.getElementById('cDesc').innerText = loc.description || "暫無故事...";
            
            const badge = document.getElementById('cBadge');
            badge.innerText = loc.isPublic ? "Public" : "Private";
            badge.className = `privacy-badge ${loc.isPublic ? 'badge-public' : 'badge-private'}`;

            const mediaBox = document.getElementById('cMedia');
            mediaBox.innerHTML = '';
            (loc.media || []).forEach(m => {
                const card = document.createElement('div'); card.className = 'media-card';
                card.innerHTML = `<img src="${m.url}" loading="lazy">`;
                mediaBox.appendChild(card);
            });

            map.flyTo([loc.lat, loc.lng], 13);
            renderList(); updateMarkers();
            
            // 手機版自動捲動到內容
            if (window.innerWidth <= 768) {
                document.querySelector('.main-content-view').scrollIntoView({ behavior: 'smooth' });
            }
        };

        window.toggleEditMode = () => {
            const main = document.getElementById('mainContent');
            const edit = document.getElementById('editMode');
            if (edit.classList.contains('hidden')) {
                const loc = locations.find(l => l.id === currentId);
                main.classList.add('hidden'); edit.classList.remove('hidden');
                document.getElementById('eTitle').value = loc.title;
                document.getElementById('eDate').value = loc.date || "";
                document.getElementById('eDesc').value = loc.description || "";
            } else {
                main.classList.remove('hidden'); edit.classList.add('hidden');
            }
        };

        window.saveChanges = async () => {
            const data = {
                title: document.getElementById('eTitle').value,
                date: document.getElementById('eDate').value,
                description: document.getElementById('eDesc').value,
                updatedAt: serverTimestamp()
            };
            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId), data, {merge:true});
            showToast("儲存成功"); toggleEditMode();
        };

        function updateMarkers() {
            markersLayer.clearLayers();
            locations.forEach(loc => {
                const icon = L.divIcon({
                    html: `<i class="fa-solid fa-location-dot ${currentId===loc.id?'text-indigo-600':'text-rose-500'} text-xl"></i>`,
                    className: '', iconAnchor: [10, 20]
                });
                L.marker([loc.lat, loc.lng], { icon }).addTo(markersLayer).on('click', () => selectLoc(loc.id));
            });
        }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        window.onload = () => { initMap(); loadData(); };
    </script>
</body>
</html>
