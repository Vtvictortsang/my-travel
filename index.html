<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>足跡管理者中心 - 高解析優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        #app-container { display: flex; flex-direction: row; height: 100vh; width: 100%; }
        .sidebar-admin { width: 380px; height: 100%; display: flex; flex-direction: column; border-right: 1px solid #e2e8f0; background: #fff; z-index: 60; flex-shrink: 0; }
        .main-content-view { flex: 1; height: 100%; overflow-y: auto; background: #fcfcfd; position: relative; scroll-behavior: smooth; }

        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            #app-container { flex-direction: column; height: auto; }
            .sidebar-admin { width: 100%; height: 92vh; border-right: none; border-bottom: 1px solid #e2e8f0; }
            .main-content-view { width: 100%; height: auto; min-height: 100vh; background: white; }
            .layer-2 { height: 35vh !important; }
        }

        .layer-1 { height: 70px; background: #1e293b; display: flex; align-items: center; padding: 0 1.25rem; z-index: 50; flex-shrink: 0; }
        .layer-2 { height: 280px; position: relative; background: #e2e8f0; flex-shrink: 0; }
        .layer-3 { flex: 1; background: #ffffff; display: flex; flex-direction: column; overflow: hidden; }
        #locationScroller { flex-direction: column; overflow-y: auto; padding: 1rem; gap: 8px; display: flex; }
        
        .date-divider { padding: 20px 8px 10px 8px; font-size: 11px; font-weight: 900; color: #94a3b8; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .date-divider::after { content: ""; flex: 1; height: 1px; background: #f1f5f9; }

        .loc-item { width: 100%; display: flex; flex-direction: row; align-items: center; padding: 12px; background: #fff; border-radius: 12px; border: 1px solid #f1f5f9; cursor: pointer; transition: all 0.2s ease; }
        .loc-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #f1f5f9; }
        .loc-item p { font-size: 15px; margin: 0 0 0 12px; font-weight: 700; color: #334155; }
        .loc-active { background-color: #f0f3ff !important; border-color: #6366f1 !important; }

        #map { height: 100%; width: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .media-scroller { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; }
        .media-card { flex: 0 0 85%; max-width: 400px; aspect-ratio: 16/10; border-radius: 16px; overflow: hidden; background: #f1f5f9; position: relative; }
        .media-card img { width: 100%; height: 100%; object-fit: cover; }

        .privacy-badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 800; text-transform: uppercase; }
        .badge-public { background: #ecfdf5; color: #10b981; }
        .badge-private { background: #eef2ff; color: #6366f1; }

        .nav-active { background-color: #6366f1 !important; color: white !important; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: #1e293b; color: white; border-radius: 12px; z-index: 9999; display: none; font-size: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .upload-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 10px; }
        .upload-preview { position: relative; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .upload-preview img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img-btn { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(239, 68, 68, 0.9); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
        .upload-placeholder { aspect-ratio: 1/1; border: 2px dashed #e2e8f0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; cursor: pointer; transition: all 0.2s; }
        
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toggle-btn { position: relative; display: inline-block; width: 50px; height: 26px; }
        .toggle-btn input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p id="loadingText" class="mt-4 font-bold text-slate-600">正在優化圖片品質...</p>
    </div>

    <div id="toast" class="toast">訊息提示</div>

    <div id="app-container">
        <div class="sidebar-admin">
            <header class="layer-1">
                <div class="flex items-center justify-between w-full">
                    <div id="userProfile" onclick="handleAuthClick()" class="flex items-center gap-3 cursor-pointer group">
                        <div id="userAvatar" class="w-10 h-10 rounded-xl bg-slate-700 flex items-center justify-center text-white overflow-hidden shadow-inner">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="flex flex-col">
                            <h1 id="userName" class="text-white font-black text-sm tracking-wide">訪客身分</h1>
                            <span id="authStatusLabel" class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">點擊登入</span>
                        </div>
                    </div>
                </div>
            </header>

            <section class="layer-2"><div id="map"></div></section>

            <section class="layer-3">
                <div class="p-4 flex justify-center shrink-0 bg-white border-b border-slate-50">
                    <div class="flex gap-2 w-full max-w-[320px]">
                        <button onclick="switchViewMode('public')" id="btnPublic" class="flex-1 py-2.5 rounded-xl text-[11px] font-black nav-active text-center">公開展區</button>
                        <button onclick="switchViewMode('private')" id="btnPrivate" class="hidden flex-1 py-2.5 rounded-xl text-[11px] font-black text-slate-400 bg-slate-50 border border-slate-100 text-center">我的後台</button>
                    </div>
                </div>
                <div id="locationScroller" class="flex-1 custom-scrollbar bg-white"></div>
            </section>
        </div>

        <div id="contentView" class="main-content-view custom-scrollbar">
            <div id="emptyContent" class="h-full min-h-[60vh] flex flex-col items-center justify-center text-slate-300 p-10 text-center">
                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6"><i class="fa-solid fa-calendar-days text-4xl opacity-20"></i></div>
                <h3 class="text-slate-900 font-black text-lg">探索足跡故事</h3>
                <p class="text-slate-400 text-sm mt-2">請從左側清單選擇地點</p>
            </div>

            <div id="mainContent" class="hidden">
                <div class="content-padding p-8 md:p-20 space-y-10 max-w-5xl mx-auto">
                    <div class="flex justify-between items-start border-b border-slate-100 pb-10">
                        <div class="space-y-4">
                            <div class="flex items-center gap-3">
                                <span id="cDate" class="text-indigo-600 font-black text-[10px] tracking-widest bg-indigo-50 px-3 py-1 rounded-full"></span>
                                <span id="cBadge" class="privacy-badge"></span>
                            </div>
                            <h2 id="cTitle" class="text-4xl md:text-7xl font-black text-slate-900 tracking-tighter leading-tight"></h2>
                        </div>
                        <div id="adminTools" class="hidden">
                            <button onclick="toggleEditMode()" class="w-12 h-12 bg-white shadow-sm border border-slate-100 text-slate-600 rounded-2xl flex items-center justify-center active:scale-90"><i class="fa-solid fa-pen-to-square"></i></button>
                        </div>
                    </div>
                    <div id="cMedia" class="media-scroller custom-scrollbar"></div>
                    <div class="prose prose-slate max-w-none">
                        <p id="cDesc" class="text-slate-600 text-xl leading-relaxed whitespace-pre-wrap font-medium"></p>
                    </div>
                </div>
            </div>

            <div id="editMode" class="hidden content-padding p-8 md:p-10 bg-slate-50 min-h-full">
                <div class="max-w-2xl mx-auto space-y-6 bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl">
                    <div class="flex items-center gap-4 border-b border-slate-50 pb-6">
                        <div class="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center"><i class="fa-solid fa-edit"></i></div>
                        <h3 class="text-2xl font-black text-slate-900">編輯內容</h3>
                    </div>
                    
                    <div class="flex items-center justify-between p-5 bg-slate-50 rounded-2xl border border-slate-100">
                        <div class="flex flex-col">
                            <span class="text-slate-900 font-black text-sm">公開展示</span>
                            <span id="privacyDesc" class="text-slate-400 text-[11px] font-bold">目前為：私人區域</span>
                        </div>
                        <label class="toggle-btn"><input type="checkbox" id="eIsPublic" onchange="updatePrivacyLabel()"><span class="slider"></span></label>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-[11px] font-black text-slate-400 ml-2 mb-2 block uppercase">照片上傳 (已優化 2MB 寬頻處理)</label>
                            <div class="upload-grid" id="editMediaGrid">
                                <div class="upload-placeholder" onclick="triggerFileInput()"><i class="fa-solid fa-camera mb-1"></i><span class="text-[9px] font-black">新增照片</span></div>
                            </div>
                            <input type="file" id="mediaInput" class="hidden" accept="image/*" multiple onchange="handleFileSelection(event)">
                        </div>
                        <div><label class="text-[11px] font-black text-slate-400 ml-2 mb-2 block uppercase">地點名稱</label><input type="text" id="eTitle" class="w-full p-5 rounded-2xl border border-slate-100 bg-slate-50 outline-none font-bold"></div>
                        <div><label class="text-[11px] font-black text-slate-400 ml-2 mb-2 block uppercase">記錄日期</label><input type="date" id="eDate" class="w-full p-5 rounded-2xl border border-slate-100 bg-slate-50 outline-none font-bold"></div>
                        <div><label class="text-[11px] font-black text-slate-400 ml-2 mb-2 block uppercase">故事內容</label><textarea id="eDesc" rows="6" class="w-full p-5 rounded-2xl border border-slate-100 bg-slate-50 outline-none font-medium"></textarea></div>
                    </div>

                    <div class="flex gap-4 pt-4">
                        <button id="saveBtn" onclick="saveChanges()" class="flex-[2] py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all">更新資料</button>
                        <button onclick="toggleEditMode()" class="flex-1 py-5 bg-slate-100 text-slate-500 font-bold rounded-2xl active:scale-95">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBFBhaRtjzBcav9dI7TfNt0E2ZjjUW1b28", authDomain: "mytraveljournal-74571.firebaseapp.com", projectId: "mytraveljournal-74571", appId: "1:1056167338813:web:8dd15d6d1dae9e8efb5b54" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = 'mytraveljournal-74571';

        let locations = [];
        let currentId = null;
        let map, markersLayer;
        let viewMode = 'public';
        let unsub = null;
        let currentEditingMedia = [];

        // 核心圖片壓縮函式更新：針對 Firestore 限制與視覺平衡進行優化
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        
                        // 系統極限考量：
                        // Firestore 單個 doc 限制為 1MB。Base64 會膨脹體積。
                        // 我們設定最大邊長為 1600px，這在 4K 螢幕以下都有很好的細節。
                        const MAX_SIZE = 1600; 
                        
                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        // 使用更高的繪圖品質
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 輸出為 JPEG，品質 0.8 是體積與清晰度的黃金分割點
                        // 預計單張圖片會在 150KB - 300KB 左右，
                        // 這樣一個足跡存放 3-4 張照片仍能符合 Firestore 1MB 的限制。
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                };
            });
        }

        function initMap() {
            map = L.map('map', { center: [22.3193, 114.1694], zoom: 12, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }

        window.handleAuthClick = () => {
            if (auth.currentUser) { if(confirm("確定要登出嗎？")) signOut(auth); }
            else { signInWithPopup(auth, provider); }
        };

        onAuthStateChanged(auth, (user) => {
            const avatar = document.getElementById('userAvatar'); const name = document.getElementById('userName');
            const label = document.getElementById('authStatusLabel'); const btnPrivate = document.getElementById('btnPrivate');
            if (user) {
                avatar.innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                name.innerText = user.displayName; label.innerText = "已登入 管理員";
                btnPrivate.style.display = 'block'; switchViewMode('private');
            } else {
                avatar.innerHTML = `<i class="fa-solid fa-user"></i>`;
                name.innerText = "訪客身分"; label.innerText = "點擊登入管理";
                btnPrivate.style.display = 'none'; switchViewMode('public');
            }
        });

        window.switchViewMode = (mode) => {
            viewMode = mode;
            currentId = null;
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('emptyContent').classList.remove('hidden');
            document.getElementById('btnPublic').className = mode === 'public' ? 'flex-1 py-2.5 rounded-xl text-[11px] font-black nav-active text-center' : 'flex-1 py-2.5 rounded-xl text-[11px] font-black text-slate-400 bg-slate-50 text-center';
            document.getElementById('btnPrivate').className = mode === 'private' ? 'flex-1 py-2.5 rounded-xl text-[11px] font-black nav-active text-center' : 'flex-1 py-2.5 rounded-xl text-[11px] font-black text-slate-400 bg-slate-50 text-center';
            loadData();
        };

        async function loadData() {
            if (unsub) unsub();
            let ref = (viewMode === 'public' || !auth.currentUser)
                ? collection(db, 'artifacts', appId, 'public', 'data', 'locations')
                : collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations');

            unsub = onSnapshot(ref, (snap) => {
                let raw = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                locations = (viewMode === 'public') ? raw.filter(l => l.isPublic === true) : raw;
                locations.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
                renderList(); updateMarkers();
            });
        }

        function renderList() {
            const container = document.getElementById('locationScroller'); container.innerHTML = '';
            let lastY = null, lastM = null;
            locations.forEach(loc => {
                if (loc.date) {
                    const d = new Date(loc.date); const y = d.getFullYear(), m = d.getMonth() + 1;
                    if (y !== lastY || m !== lastM) {
                        const div = document.createElement('div'); div.className = 'date-divider';
                        div.innerHTML = `<span>${y}年 ${m}月</span>`; container.appendChild(div);
                        lastY = y; lastM = m;
                    }
                }
                const item = document.createElement('div');
                item.className = `loc-item ${currentId === loc.id ? 'loc-active' : ''}`;
                const thumb = (loc.media && loc.media[0]) ? loc.media[0].url : 'https://ui-avatars.com/api/?name=Spot&background=f1f5f9';
                item.innerHTML = `<img src="${thumb}" class="loc-thumb"><p class="truncate">${loc.title}</p>`;
                item.onclick = () => selectLoc(loc.id);
                container.appendChild(item);
            });
        }

        function selectLoc(id) {
            currentId = id; const loc = locations.find(l => l.id === id); if (!loc) return;
            document.getElementById('emptyContent').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('editMode').classList.add('hidden');
            document.getElementById('adminTools').style.display = (auth.currentUser && viewMode === 'private') ? 'block' : 'none';
            updateDetailUI(loc); renderList(); updateMarkers();
        }

        function updateMarkers() {
            markersLayer.clearLayers();
            locations.forEach(loc => {
                const isActive = currentId === loc.id;
                const icon = L.divIcon({ html: `<i class="fa-solid fa-location-dot ${isActive ? 'text-indigo-600 scale-125' : 'text-rose-500'} text-2xl"></i>`, className: '', iconAnchor: [12, 24] });
                L.marker([loc.lat, loc.lng], { icon }).addTo(markersLayer).on('click', () => selectLoc(loc.id));
                if (isActive) map.panTo([loc.lat, loc.lng]);
            });
        }

        function updateDetailUI(loc) {
            document.getElementById('cTitle').innerText = loc.title;
            document.getElementById('cDate').innerText = loc.date || "未提供日期";
            document.getElementById('cDesc').innerText = loc.description || "";
            const badge = document.getElementById('cBadge');
            badge.innerText = loc.isPublic ? "公開展示" : "私人存檔";
            badge.className = `privacy-badge ${loc.isPublic ? 'badge-public' : 'badge-private'}`;
            const media = document.getElementById('cMedia'); media.innerHTML = '';
            (loc.media || []).forEach(m => {
                const div = document.createElement('div'); div.className = 'media-card';
                div.innerHTML = `<img src="${m.url}" loading="lazy">`; media.appendChild(div);
            });
        }

        window.toggleEditMode = () => {
            const edit = document.getElementById('editMode');
            const main = document.getElementById('mainContent');
            if (edit.classList.contains('hidden')) {
                const loc = locations.find(l => l.id === currentId);
                main.classList.add('hidden'); edit.classList.remove('hidden');
                document.getElementById('eTitle').value = loc.title;
                document.getElementById('eDate').value = loc.date || "";
                document.getElementById('eDesc').value = loc.description || "";
                document.getElementById('eIsPublic').checked = loc.isPublic || false;
                currentEditingMedia = [...(loc.media || [])];
                renderEditMedia(); updatePrivacyLabel();
            } else { edit.classList.add('hidden'); main.classList.remove('hidden'); }
        };

        window.triggerFileInput = () => document.getElementById('mediaInput').click();
        window.handleFileSelection = async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingText').innerText = "正在處理高解析度優化...";
            
            for (let file of files) {
                try {
                    const compressedUrl = await compressImage(file);
                    currentEditingMedia.push({ type: 'image', url: compressedUrl });
                } catch (err) {
                    console.error("圖片處理失敗", err);
                }
            }
            renderEditMedia();
            document.getElementById('loadingOverlay').style.display = 'none';
            e.target.value = '';
        };

        function renderEditMedia() {
            const grid = document.getElementById('editMediaGrid');
            const placeholder = grid.querySelector('.upload-placeholder');
            grid.innerHTML = '';
            currentEditingMedia.forEach((m, i) => {
                const div = document.createElement('div'); div.className = 'upload-preview';
                div.innerHTML = `<img src="${m.url}"><div class="remove-img-btn" onclick="removeMedia(${i})"><i class="fa-solid fa-times"></i></div>`;
                grid.appendChild(div);
            });
            grid.appendChild(placeholder);
        }

        window.removeMedia = (i) => { currentEditingMedia.splice(i, 1); renderEditMedia(); };
        window.updatePrivacyLabel = () => {
            const isPub = document.getElementById('eIsPublic').checked;
            document.getElementById('privacyDesc').innerText = isPub ? "目前為：公開展示" : "目前為：私人區域";
        };

        window.saveChanges = async () => {
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            document.getElementById('loadingText').innerText = "正在同步數據到雲端...";
            
            const isPub = document.getElementById('eIsPublic').checked;
            const fullLoc = locations.find(l => l.id === currentId);
            
            // 系統極限檢查：計算媒體資料總體積
            const mediaSize = JSON.stringify(currentEditingMedia).length;
            if (mediaSize > 850000) { // 預留空間給文字，大約 850KB
                loading.style.display = 'none';
                showToast("錯誤：圖片過多或解析度過高，超過儲存極限。請刪除一張照片後重試。");
                return;
            }

            const data = {
                title: document.getElementById('eTitle').value,
                date: document.getElementById('eDate').value,
                description: document.getElementById('eDesc').value,
                isPublic: isPub,
                media: currentEditingMedia,
                updatedAt: serverTimestamp()
            };

            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId), data, {merge:true});
                const pubDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId);
                if (isPub) {
                    await setDoc(pubDocRef, { ...fullLoc, ...data });
                } else {
                    await deleteDoc(pubDocRef).catch(() => {});
                }
                showToast("更新完成！解析度已優化");
                toggleEditMode();
            } catch(e) { 
                console.error(e);
                showToast("儲存失敗：可能超過單一文件 1MB 的限制"); 
            }
            finally { loading.style.display = 'none'; }
        };

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        window.onload = () => { initMap(); loadData(); };
    </script>
</body>
</html>
