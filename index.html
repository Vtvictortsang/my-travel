<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊足跡 - 雲端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        #displayImage {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
        .modal-animate {
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #6366f1;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- 左側欄：地點列表 -->
    <aside class="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col h-1/3 md:h-full z-10 shadow-lg md:shadow-none">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-indigo-600 text-white">
            <h1 class="text-xl font-bold tracking-tight"><i class="fa-solid fa-cloud mr-2"></i>旅遊足跡</h1>
            <button id="addBtn" onclick="addNewLocation()" class="hover:bg-indigo-500 p-2 rounded-full transition-colors disabled:opacity-50" title="新增地點">
                <i class="fa-solid fa-plus text-lg"></i>
            </button>
        </div>
        
        <div id="locationList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
            <div class="flex items-center justify-center p-10 text-slate-400">
                <div class="loading-spinner mr-3"></div>
                載入中...
            </div>
        </div>
    </aside>

    <!-- 右側欄：內容展示與編輯 -->
    <main class="flex-1 h-2/3 md:h-full overflow-y-auto bg-slate-50 relative custom-scrollbar">
        <!-- 空狀態提示 -->
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
            <i class="fa-solid fa-map-marked-alt text-6xl mb-4 opacity-20"></i>
            <p class="text-xl">選擇一個地點開啟你的回憶</p>
            <p class="text-sm mt-2 opacity-60">資料已與雲端同步儲存</p>
        </div>

        <!-- 內容呈現區 -->
        <div id="contentView" class="hidden max-w-5xl mx-auto p-4 md:p-10">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                
                <!-- 標題與操作按鈕 -->
                <div class="p-6 md:p-8 border-b border-slate-50 flex justify-between items-center bg-white">
                    <h2 id="displayTitle" class="text-2xl md:text-3xl font-bold text-slate-800 truncate mr-4">地點名稱</h2>
                    <div class="flex space-x-2 flex-shrink-0">
                        <button onclick="openShareModal()" class="flex items-center px-3 py-2 md:px-4 md:py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 rounded-lg transition-all text-sm md:text-base">
                            <i class="fa-solid fa-share-nodes md:mr-2"></i><span class="hidden md:inline">分享</span>
                        </button>
                        <button onclick="toggleEditMode()" class="flex items-center px-3 py-2 md:px-4 md:py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-all text-sm md:text-base">
                            <i class="fa-solid fa-pen-to-square md:mr-2"></i><span class="hidden md:inline">編輯</span>
                        </button>
                        <button onclick="deleteCurrentLocation()" class="flex items-center px-3 py-2 md:px-4 md:py-2 bg-red-50 hover:bg-red-100 text-red-500 rounded-lg transition-all text-sm md:text-base">
                            <i class="fa-solid fa-trash-can md:mr-2"></i><span class="hidden md:inline">刪除</span>
                        </button>
                    </div>
                </div>

                <!-- 圖片展示區 -->
                <div id="displayImageContainer" class="w-full bg-slate-100 border-b border-slate-50 min-h-[100px] flex items-center justify-center">
                    <img id="displayImage" src="" alt="地點圖片" class="hidden">
                    <div id="imagePlaceholder" class="py-20 w-full flex flex-col items-center justify-center text-slate-400">
                        <i class="fa-solid fa-image text-4xl mb-2"></i>
                        <span>尚未加入圖片連結</span>
                    </div>
                </div>

                <div class="p-6 md:p-8">
                    <div id="displayDescription" class="text-slate-600 leading-relaxed whitespace-pre-wrap text-lg min-h-[100px]">
                        分享你的內容...
                    </div>

                    <!-- 編輯模式表單 -->
                    <div id="editForm" class="hidden space-y-4 mt-2">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">地點名稱</label>
                                <input type="text" id="editTitleInput" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">圖片網址 (URL)</label>
                                <input type="text" id="editImageInput" placeholder="請貼上圖片連結" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">內容分享</label>
                            <textarea id="editDescInput" rows="8" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"></textarea>
                        </div>
                        <div class="flex space-x-3 pt-4 border-t border-slate-100">
                            <button id="saveBtn" onclick="saveChanges()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition-all shadow-md shadow-indigo-100 disabled:bg-slate-400">
                                儲存修改
                            </button>
                            <button onclick="toggleEditMode()" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium rounded-xl transition-all">
                                取消
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="h-10"></div>
        </div>
    </main>

    <!-- 分享彈窗 -->
    <div id="shareModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl modal-animate">
            <div class="p-6 text-center border-b border-slate-50">
                <h3 class="text-xl font-bold text-slate-800">分享旅遊足跡</h3>
                <p id="shareTitlePreview" class="text-slate-500 text-sm mt-1 truncate"></p>
            </div>
            <div class="p-6 grid grid-cols-2 gap-4">
                <button onclick="shareTo('facebook')" class="flex flex-col items-center justify-center p-4 rounded-2xl hover:bg-blue-50 transition-colors group">
                    <div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center text-xl mb-2 group-hover:scale-110 transition-transform">
                        <i class="fa-brands fa-facebook-f"></i>
                    </div>
                    <span class="text-sm font-medium text-slate-600">Facebook</span>
                </button>
                <button onclick="shareTo('whatsapp')" class="flex flex-col items-center justify-center p-4 rounded-2xl hover:bg-green-50 transition-colors group">
                    <div class="w-12 h-12 bg-green-500 text-white rounded-full flex items-center justify-center text-xl mb-2 group-hover:scale-110 transition-transform">
                        <i class="fa-brands fa-whatsapp"></i>
                    </div>
                    <span class="text-sm font-medium text-slate-600">WhatsApp</span>
                </button>
                <button onclick="shareTo('line')" class="flex flex-col items-center justify-center p-4 rounded-2xl hover:bg-emerald-50 transition-colors group">
                    <div class="w-12 h-12 bg-emerald-500 text-white rounded-full flex items-center justify-center text-xl mb-2 group-hover:scale-110 transition-transform">
                        <i class="fa-brands fa-line"></i>
                    </div>
                    <span class="text-sm font-medium text-slate-600">LINE</span>
                </button>
                <button onclick="shareTo('copy')" class="flex flex-col items-center justify-center p-4 rounded-2xl hover:bg-slate-50 transition-colors group">
                    <div class="w-12 h-12 bg-slate-600 text-white rounded-full flex items-center justify-center text-xl mb-2 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-link"></i>
                    </div>
                    <span class="text-sm font-medium text-slate-600">複製連結</span>
                </button>
            </div>
            <button onclick="closeShareModal()" class="w-full py-4 bg-slate-50 text-slate-500 font-medium hover:text-slate-700 transition-colors">
                關閉
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置 - 使用你提供的參數
        const firebaseConfig = {
            apiKey: "AIzaSyBFBhaRtjzBcav9dI7TfNt0E2ZjjUW1b28",
            authDomain: "mytraveljournal-74571.firebaseapp.com",
            projectId: "mytraveljournal-74571",
            storageBucket: "mytraveljournal-74571.firebasestorage.app",
            messagingSenderId: "1056167338813",
            appId: "1:1056167338813:web:8dd15d6d1dae9e8efb5b54",
            measurementId: "G-SWKJ3RBM15"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'mytravel-app'; // 固定一個 App ID 用於資料分區

        let locations = [];
        let currentId = null;
        let currentUser = null;

        // 初始化身份驗證 (匿名登入)
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error:", error);
                alert("Firebase 身份驗證失敗，請檢查控制台設定是否開啟了匿名登入。");
            }
        };

        initAuth();

        // 監聽登入狀態並掛載資料監聽
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // 使用 RULE 1 指定的路徑，方便在控制台尋找
                const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
                
                // 即時監聽資料變化
                onSnapshot(collectionRef, (snapshot) => {
                    locations = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    renderList();
                    
                    if (currentId) {
                        const activeLoc = locations.find(l => l.id === currentId);
                        if (activeLoc) updateUI(activeLoc);
                    }
                }, (error) => {
                    console.error("Firestore Error:", error);
                    if(error.code === 'permission-denied') {
                        alert("權限不足：請確保在 Firebase 控制台將 Firestore 設定為『測試模式』。");
                    }
                });
            }
        });

        // 渲染列表
        window.renderList = function() {
            const listElement = document.getElementById('locationList');
            if (!listElement) return;
            listElement.innerHTML = '';
            
            if (locations.length === 0) {
                listElement.innerHTML = `<div class="p-10 text-center text-slate-400 text-sm italic">點擊上方 + 開始新增</div>`;
            }

            locations.forEach(loc => {
                const item = document.createElement('div');
                const isActive = currentId === loc.id;
                item.className = `p-4 mb-2 cursor-pointer rounded-xl transition-all flex items-center space-x-3 ${isActive ? 'bg-indigo-50 border-l-4 border-indigo-500 shadow-sm' : 'hover:bg-slate-50 text-slate-600'}`;
                item.onclick = () => selectLocation(loc.id);
                
                item.innerHTML = `
                    <div class="w-10 h-10 rounded-lg bg-slate-200 overflow-hidden flex-shrink-0 flex items-center justify-center">
                        ${loc.image ? `<img src="${loc.image}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-image text-slate-400"></i>`}
                    </div>
                    <span class="font-medium truncate flex-1">${loc.title || "新地點"}</span>
                `;
                listElement.appendChild(item);
            });
        };

        // 選擇地點
        window.selectLocation = function(id) {
            currentId = id;
            const loc = locations.find(l => l.id === id);
            if (!loc) return;
            updateUI(loc);
            renderList();
        };

        // 更新右側界面
        function updateUI(loc) {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('contentView').classList.remove('hidden');
            document.getElementById('editForm').classList.add('hidden');
            document.getElementById('displayDescription').classList.remove('hidden');
            
            document.getElementById('displayTitle').innerText = loc.title || "新地點";
            document.getElementById('displayDescription').innerText = loc.description || "分享你的內容...";
            
            const img = document.getElementById('displayImage');
            const placeholder = document.getElementById('imagePlaceholder');
            
            if (loc.image && loc.image.trim() !== "") {
                img.src = loc.image;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
        }

        // 新增地點到雲端
        window.addNewLocation = async function() {
            if (!currentUser) return;
            try {
                const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'locations'), {
                    title: "我的新旅程",
                    image: "",
                    description: "",
                    createdAt: serverTimestamp(),
                    userId: currentUser.uid
                });
                currentId = docRef.id;
                // 自動觸發編輯模式
                setTimeout(() => toggleEditMode(), 100);
            } catch (e) {
                console.error("Add Error: ", e);
            }
        };

        // 切換編輯模式
        window.toggleEditMode = function() {
            const form = document.getElementById('editForm');
            const desc = document.getElementById('displayDescription');
            const isHidden = form.classList.contains('hidden');
            const loc = locations.find(l => l.id === currentId);
            
            if (!loc) return;

            if (isHidden) {
                document.getElementById('editTitleInput').value = loc.title || "";
                document.getElementById('editImageInput').value = loc.image || "";
                document.getElementById('editDescInput').value = loc.description || "";
                form.classList.remove('hidden');
                desc.classList.add('hidden');
            } else {
                form.classList.add('hidden');
                desc.classList.remove('hidden');
            }
        };

        // 儲存修改到雲端
        window.saveChanges = async function() {
            if (!currentUser || !currentId) return;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = "儲存中...";

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId);
                await setDoc(docRef, {
                    title: document.getElementById('editTitleInput').value,
                    image: document.getElementById('editImageInput').value,
                    description: document.getElementById('editDescInput').value,
                    updatedAt: serverTimestamp()
                }, { merge: true });
                
                toggleEditMode();
            } catch (e) {
                console.error("Save Error: ", e);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = "儲存修改";
            }
        };

        // 從雲端刪除
        window.deleteCurrentLocation = async function() {
            if (!currentId || !currentUser) return;
            const loc = locations.find(l => l.id === currentId);
            const confirmDelete = confirm(`確定要刪除「${loc.title}」嗎？`);
            
            if (confirmDelete) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId));
                    currentId = null;
                    document.getElementById('contentView').classList.add('hidden');
                    document.getElementById('emptyState').classList.remove('hidden');
                } catch (e) {
                    console.error("Delete Error: ", e);
                }
            }
        };

        // 分享邏輯
        window.openShareModal = function() {
            const loc = locations.find(l => l.id === currentId);
            if (!loc) return;
            document.getElementById('shareTitlePreview').innerText = `分享地點：${loc.title}`;
            document.getElementById('shareModal').classList.remove('hidden');
        };

        window.closeShareModal = function() {
            document.getElementById('shareModal').classList.add('hidden');
        };

        window.shareTo = function(platform) {
            const loc = locations.find(l => l.id === currentId);
            const url = window.location.href;
            const text = `看看我分享的旅遊地點：${loc.title}\n${loc.description}`;
            
            let shareUrl = "";
            switch(platform) {
                case 'facebook': shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`; break;
                case 'whatsapp': shareUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text + " " + url)}`; break;
                case 'line': shareUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`; break;
                case 'copy': copyToClipboard(url); return;
            }
            if (shareUrl) window.open(shareUrl, '_blank');
        };

        function copyToClipboard(text) {
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            const copyBtn = document.querySelector('button[onclick="shareTo(\'copy\')"] span');
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "已複製！";
            setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
        }
    </script>
</body>
</html>
