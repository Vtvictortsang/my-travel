<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>足跡管理者中心 - 隱私設定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        #app-container { 
            display: flex; 
            flex-direction: row; 
            height: 100vh; 
            width: 100%; 
        }

        .sidebar-admin { 
            width: 380px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #e2e8f0; 
            background: #fff;
            z-index: 60;
            flex-shrink: 0;
        }

        .main-content-view { 
            flex: 1; 
            height: 100%; 
            overflow-y: auto; 
            background: #fcfcfd; 
            position: relative;
            scroll-behavior: smooth;
        }

        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            #app-container { flex-direction: column; height: auto; }
            .sidebar-admin { width: 100%; height: 92vh; border-right: none; border-bottom: 1px solid #e2e8f0; }
            .main-content-view { width: 100%; height: auto; min-height: 100vh; background: white; }
            .layer-2 { height: 35vh !important; }
            .content-padding { padding: 2.5rem 1.5rem !important; }
            #cTitle { font-size: 2.2rem !important; line-height: 1.2; }
        }

        .layer-1 { height: 70px; background: #1e293b; display: flex; align-items: center; padding: 0 1.25rem; z-index: 50; flex-shrink: 0; }
        .layer-2 { height: 280px; position: relative; background: #e2e8f0; flex-shrink: 0; }
        .layer-3 { flex: 1; background: #ffffff; display: flex; flex-direction: column; overflow: hidden; }
        
        #locationScroller { flex-direction: column; overflow-y: auto; padding: 1rem; gap: 8px; display: flex; }
        
        .date-divider {
            padding: 20px 8px 10px 8px;
            font-size: 11px;
            font-weight: 900;
            color: #94a3b8;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-divider::after { content: ""; flex: 1; height: 1px; background: #f1f5f9; }

        .loc-item { width: 100%; display: flex; flex-direction: row; align-items: center; padding: 12px; background: #fff; border-radius: 12px; border: 1px solid #f1f5f9; cursor: pointer; transition: all 0.2s ease; }
        .loc-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #f1f5f9; }
        .loc-item p { font-size: 15px; margin: 0 0 0 12px; font-weight: 700; color: #334155; }
        .loc-active { background-color: #f0f3ff !important; border-color: #6366f1 !important; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1); }

        #map { height: 100%; width: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .media-scroller { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; }
        .media-card { flex: 0 0 85%; max-width: 400px; aspect-ratio: 16/10; border-radius: 16px; overflow: hidden; background: #f1f5f9; }
        .media-card img { width: 100%; height: 100%; object-fit: cover; }

        .privacy-badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 800; text-transform: uppercase; }
        .badge-public { background: #ecfdf5; color: #10b981; }
        .badge-private { background: #eef2ff; color: #6366f1; }

        .nav-active { background-color: #6366f1 !important; color: white !important; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: #1e293b; color: white; border-radius: 12px; z-index: 9999; display: none; font-size: 14px; }

        /* 切換開關樣式 */
        .toggle-btn {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .toggle-btn input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

    <div id="toast" class="toast">訊息提示</div>

    <div id="app-container">
        <!-- 側邊欄 -->
        <div class="sidebar-admin">
            <header class="layer-1">
                <div class="flex items-center justify-between w-full">
                    <div id="userProfile" onclick="handleAuthClick()" class="flex items-center gap-3 cursor-pointer group">
                        <div id="userAvatar" class="w-10 h-10 rounded-xl bg-slate-700 flex items-center justify-center text-white overflow-hidden shadow-inner group-hover:ring-2 group-hover:ring-indigo-400 transition-all">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="flex flex-col">
                            <h1 id="userName" class="text-white font-black text-sm tracking-wide">訪客身分</h1>
                            <span id="authStatusLabel" class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">點擊登入</span>
                        </div>
                    </div>
                    <button id="addBtn" onclick="addNewLocation()" class="hidden w-10 h-10 bg-indigo-500 text-white rounded-xl items-center justify-center shadow-lg active:scale-95 transition-all">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </header>

            <section class="layer-2">
                <div id="map"></div>
            </section>

            <section class="layer-3">
                <!-- 管理後台按鈕置中 -->
                <div class="p-4 flex justify-center shrink-0 bg-white border-b border-slate-50">
                    <div class="flex gap-2 w-full max-w-[320px]">
                        <button onclick="switchViewMode('public')" id="btnPublic" class="flex-1 py-2.5 rounded-xl text-[11px] font-black transition-all nav-active text-center">公開展區</button>
                        <button onclick="switchViewMode('private')" id="btnPrivate" class="hidden flex-1 py-2.5 rounded-xl text-[11px] font-black text-slate-400 bg-slate-50 border border-slate-100 transition-all text-center">我的管理後台</button>
                    </div>
                </div>
                <div id="locationScroller" class="flex-1 custom-scrollbar bg-white">
                    <!-- 清單與年份標籤將注入於此 -->
                </div>
            </section>
        </div>

        <!-- 內容視圖 -->
        <div id="contentView" class="main-content-view custom-scrollbar">
            <div id="emptyContent" class="h-full min-h-[60vh] flex flex-col items-center justify-center text-slate-300 p-10 text-center">
                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6">
                    <i class="fa-solid fa-calendar-days text-4xl opacity-20"></i>
                </div>
                <h3 class="text-slate-900 font-black text-lg">探索足跡故事</h3>
                <p class="text-slate-400 text-sm mt-2">請從左側清單選擇地點或點擊地圖標記</p>
            </div>

            <div id="mainContent" class="hidden">
                <div class="content-padding p-8 md:p-20 space-y-10 max-w-5xl mx-auto">
                    <div class="flex justify-between items-start border-b border-slate-100 pb-10">
                        <div class="space-y-4">
                            <div class="flex items-center gap-3">
                                <span id="cDate" class="text-indigo-600 font-black text-[10px] tracking-widest bg-indigo-50 px-3 py-1 rounded-full"></span>
                                <span id="cBadge" class="privacy-badge"></span>
                            </div>
                            <h2 id="cTitle" class="text-4xl md:text-7xl font-black text-slate-900 tracking-tighter leading-tight"></h2>
                        </div>
                        <div id="adminTools" class="hidden flex gap-2">
                            <button onclick="toggleEditMode()" class="w-12 h-12 bg-white shadow-sm border border-slate-100 text-slate-600 rounded-2xl flex items-center justify-center active:scale-90 transition-all">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                        </div>
                    </div>

                    <div id="cMedia" class="media-scroller custom-scrollbar"></div>

                    <div class="prose prose-slate max-w-none">
                        <p id="cDesc" class="text-slate-600 text-xl leading-relaxed whitespace-pre-wrap font-medium"></p>
                    </div>
                </div>
            </div>

            <!-- 編輯模式 -->
            <div id="editMode" class="hidden content-padding p-8 md:p-10 bg-slate-50 min-h-full">
                <div class="max-w-2xl mx-auto space-y-6 bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-white">
                    <div class="flex items-center gap-4 border-b border-slate-50 pb-6">
                        <div class="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center">
                            <i class="fa-solid fa-edit"></i>
                        </div>
                        <h3 class="text-2xl font-black text-slate-900">編輯內容</h3>
                    </div>

                    <!-- 隱私選擇區塊 -->
                    <div class="flex items-center justify-between p-5 bg-slate-50 rounded-2xl border border-slate-100">
                        <div class="flex flex-col">
                            <span class="text-slate-900 font-black text-sm">公開展示於展區</span>
                            <span id="privacyDesc" class="text-slate-400 text-[11px] font-bold">目前為：私人區域</span>
                        </div>
                        <label class="toggle-btn">
                            <input type="checkbox" id="eIsPublic" onchange="updatePrivacyLabel()">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-[11px] font-black text-slate-400 ml-2 mb-2 block uppercase">地點名稱</label>
                            <input type="text" id="eTitle" class="w-full p-5 rounded-2xl border border-slate-100 bg-slate-50 outline-none font-bold focus:bg-white transition-all" placeholder="輸入地點名稱">
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-slate-400 ml-2 mb-2 block uppercase">記錄日期</label>
                            <input type="date" id="eDate" class="w-full p-5 rounded-2xl border border-slate-100 bg-slate-50 outline-none font-bold focus:bg-white transition-all">
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-slate-400 ml-2 mb-2 block uppercase">足跡故事</label>
                            <textarea id="eDesc" rows="6" class="w-full p-5 rounded-2xl border border-slate-100 bg-slate-50 outline-none font-medium focus:bg-white transition-all" placeholder="在這裡寫下故事..."></textarea>
                        </div>
                    </div>

                    <div class="flex gap-4 pt-4">
                        <button onclick="saveChanges()" class="flex-[2] py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all">更新足跡資料</button>
                        <button onclick="toggleEditMode()" class="flex-1 py-5 bg-slate-100 text-slate-500 font-bold rounded-2xl active:scale-95 transition-all">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFBhaRtjzBcav9dI7TfNt0E2ZjjUW1b28",
            authDomain: "mytraveljournal-74571.firebaseapp.com",
            projectId: "mytraveljournal-74571",
            appId: "1:1056167338813:web:8dd15d6d1dae9e8efb5b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = 'mytraveljournal-74571';

        let locations = [];
        let currentId = null;
        let map, markersLayer;
        let viewMode = 'public';
        let unsub = null;

        function initMap() {
            map = L.map('map', { center: [22.3193, 114.1694], zoom: 12, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }

        window.handleAuthClick = () => {
            if (auth.currentUser) {
                if(confirm("確定要登出嗎？")) signOut(auth).then(() => {
                   window.location.reload();
                });
            } else {
                signInWithPopup(auth, provider).then(() => showToast("歡迎回來！")).catch(e => console.error(e));
            }
        };

        onAuthStateChanged(auth, (user) => {
            const avatar = document.getElementById('userAvatar');
            const name = document.getElementById('userName');
            const label = document.getElementById('authStatusLabel');
            const btnPrivate = document.getElementById('btnPrivate');

            if (user) {
                avatar.innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                name.innerText = user.displayName;
                label.innerText = "已登入 (點擊登出)";
                btnPrivate.style.display = 'block';
                switchViewMode('private');
            } else {
                avatar.innerHTML = `<i class="fa-solid fa-user"></i>`;
                name.innerText = "訪客身分";
                label.innerText = "點擊登入管理";
                btnPrivate.style.display = 'none';
                switchViewMode('public');
            }
        });

        window.switchViewMode = (mode) => {
            viewMode = mode;
            const isPub = mode === 'public';
            document.getElementById('btnPublic').className = isPub ? 'flex-1 py-2.5 rounded-xl text-[11px] font-black transition-all nav-active text-center' : 'flex-1 py-2.5 rounded-xl text-[11px] font-black text-slate-400 bg-slate-50 border border-slate-100 text-center';
            document.getElementById('btnPrivate').className = !isPub ? 'flex-1 py-2.5 rounded-xl text-[11px] font-black nav-active text-center' : 'flex-1 py-2.5 rounded-xl text-[11px] font-black text-slate-400 bg-slate-50 border border-slate-100 text-center';
            document.getElementById('addBtn').style.display = (!isPub && auth.currentUser) ? 'flex' : 'none';
            loadData();
        };

        async function loadData() {
            if (unsub) unsub();
            let ref = (viewMode === 'public' || !auth.currentUser)
                ? collection(db, 'artifacts', appId, 'public', 'data', 'locations')
                : collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations');

            unsub = onSnapshot(ref, (snap) => {
                let rawLocations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                // 公開展區邏輯：必須是公開且必須有日期
                if (viewMode === 'public') {
                    locations = rawLocations.filter(l => l.isPublic === true && l.date && l.date !== "");
                } else {
                    locations = rawLocations;
                }

                locations.sort((a, b) => (b.date || "0000-00-00").localeCompare(a.date || "0000-00-00"));
                renderList(); 
                updateMarkers();
            });
        }

        function renderList() {
            const container = document.getElementById('locationScroller');
            container.innerHTML = '';
            let lastYear = null; let lastMonth = null;

            locations.forEach(loc => {
                if (loc.date) {
                    const d = new Date(loc.date);
                    const y = d.getFullYear(); const m = d.getMonth() + 1;
                    if (y !== lastYear || m !== lastMonth) {
                        const divider = document.createElement('div');
                        divider.className = 'date-divider';
                        divider.innerHTML = `<span>${y}年 ${m}月</span>`;
                        container.appendChild(divider);
                        lastYear = y; lastMonth = m;
                    }
                } else if (lastYear !== "未分類") {
                    const divider = document.createElement('div');
                    divider.className = 'date-divider'; divider.innerHTML = `<span>未註記日期</span>`;
                    container.appendChild(divider); lastYear = "未分類";
                }

                const div = document.createElement('div');
                div.className = `loc-item ${currentId === loc.id ? 'loc-active' : ''}`;
                const thumb = (loc.media && loc.media[0]) ? loc.media[0].url : 'https://ui-avatars.com/api/?background=f1f5f9&color=cbd5e1&name=Spot';
                div.innerHTML = `<img src="${thumb}" class="loc-thumb"><p class="truncate">${loc.title}</p>`;
                div.onclick = () => selectLoc(loc.id);
                container.appendChild(div);
            });
        }

        window.selectLoc = (id) => {
            currentId = id;
            const loc = locations.find(l => l.id === id);
            if (!loc) return;

            document.getElementById('emptyContent').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('editMode').classList.add('hidden');

            const isAdmin = auth.currentUser && (viewMode === 'private');
            document.getElementById('adminTools').style.display = isAdmin ? 'flex' : 'none';

            document.getElementById('cTitle').innerText = loc.title;
            document.getElementById('cDate').innerText = loc.date || "日期未註記";
            document.getElementById('cDesc').innerText = loc.description || "分享一段美好的回憶吧...";
            
            const badge = document.getElementById('cBadge');
            badge.innerText = loc.isPublic ? "公開足跡" : "私人區域";
            badge.className = `privacy-badge ${loc.isPublic ? 'badge-public' : 'badge-private'}`;

            const mediaBox = document.getElementById('cMedia');
            mediaBox.innerHTML = '';
            (loc.media || []).forEach(m => {
                const card = document.createElement('div'); card.className = 'media-card';
                card.innerHTML = `<img src="${m.url}" loading="lazy">`;
                mediaBox.appendChild(card);
            });

            map.flyTo([loc.lat, loc.lng], 14);
            renderList(); updateMarkers();
        };

        function updateMarkers() {
            markersLayer.clearLayers();
            locations.forEach(loc => {
                const isActive = currentId === loc.id;
                const icon = L.divIcon({
                    html: `<i class="fa-solid fa-location-dot ${isActive ? 'text-indigo-600 scale-125' : 'text-rose-500'} text-2xl transition-all"></i>`,
                    className: '', iconAnchor: [12, 24]
                });
                L.marker([loc.lat, loc.lng], { icon }).addTo(markersLayer).on('click', () => selectLoc(loc.id));
            });
        }

        window.toggleEditMode = () => {
            const main = document.getElementById('mainContent');
            const edit = document.getElementById('editMode');
            if (edit.classList.contains('hidden')) {
                const loc = locations.find(l => l.id === currentId);
                main.classList.add('hidden'); 
                edit.classList.remove('hidden');
                document.getElementById('eTitle').value = loc.title;
                document.getElementById('eDate').value = loc.date || "";
                document.getElementById('eDesc').value = loc.description || "";
                document.getElementById('eIsPublic').checked = loc.isPublic || false;
                updatePrivacyLabel();
            } else {
                main.classList.remove('hidden'); edit.classList.add('hidden');
            }
        };

        window.updatePrivacyLabel = () => {
            const isPublic = document.getElementById('eIsPublic').checked;
            document.getElementById('privacyDesc').innerText = isPublic ? "目前為：公開展示" : "目前為：私人區域";
        };

        window.saveChanges = async () => {
            const isPublic = document.getElementById('eIsPublic').checked;
            const data = {
                title: document.getElementById('eTitle').value,
                date: document.getElementById('eDate').value,
                description: document.getElementById('eDesc').value,
                isPublic: isPublic,
                updatedAt: serverTimestamp()
            };
            try {
                // 更新私有資料
                await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'locations', currentId), data, {merge:true});
                
                // 如果是公開，同步到公開庫；如果不是公開，從公開庫刪除（簡化邏輯：每次更新私有資料時，公開庫視情況同步）
                const publicDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', currentId);
                if (isPublic && data.date) {
                    // 同步到公開區（需包含經緯度與媒體資料，從當前 locations 取得）
                    const fullLoc = locations.find(l => l.id === currentId);
                    await setDoc(publicDocRef, { ...fullLoc, ...data });
                } else {
                    // 若設為私人或無日期，則不顯示在公開展區（此處可實作刪除邏輯，但建議使用雲端函數或簡化處理）
                    // 為了範例完整，這裡僅示範欄位更新，若需要正式移除，需呼叫 deleteDoc
                }

                showToast("更新成功"); 
                toggleEditMode();
            } catch (e) {
                showToast("更新失敗");
            }
        };

        function showToast(m) { 
            const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3000); 
        }

        window.onload = () => { initMap(); loadData(); };
    </script>
</body>
</html>
